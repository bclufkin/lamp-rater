<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bedroom Lamp Rater — Brad & Wes</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Nunito:wght@300;400;600&display=swap');
:root {
  --navy:#22304A; --navy-dark:#1A2538; --plum:#252030;
  --tc:#B85830; --tc-light:#D4703D; --tc-dim:rgba(184,88,48,0.15);
  --cream:#F2EDE6; --text:#E8E2D8; --muted:rgba(232,226,216,0.45);
  --star-on:#D4703D; --star-off:rgba(255,255,255,0.16);
  --card:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.07);
  --img-h:320px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--navy);color:var(--text);font-family:'Nunito',system-ui,sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column;}
.hdr{background:var(--navy-dark);border-bottom:2px solid var(--tc);padding:14px 24px 12px;text-align:center;}
.hdr h1{font-family:'Cormorant Garamond',serif;font-size:1.55rem;font-weight:700;letter-spacing:0.1em;color:var(--cream);text-transform:uppercase;}
.sync-status{font-size:0.64rem;letter-spacing:0.1em;text-transform:uppercase;margin-top:4px;height:16px;transition:color 0.3s;}
.sync-status.saving{color:var(--tc-light);}
.sync-status.saved{color:rgba(120,200,120,0.8);}
.sync-status.error{color:rgba(220,80,80,0.8);}
.sync-status.loading{color:var(--muted);}
.prog-row{display:flex;align-items:center;gap:10px;justify-content:center;margin-top:8px;}
.prog-label{font-size:0.7rem;color:var(--muted);letter-spacing:0.06em;white-space:nowrap;}
.prog-track{width:200px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--tc);border-radius:2px;transition:width 0.4s;}
#view{flex:1;max-width:960px;width:100%;margin:0 auto;padding:0 0 60px;}
.sec-div{padding:18px 24px;background:var(--plum);border-top:2px solid var(--tc);border-bottom:2px solid var(--tc);text-align:center;}
.sec-div h2{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;color:var(--cream);}
.sec-div .sec-line{display:flex;align-items:center;gap:12px;justify-content:center;margin-top:5px;}
.sec-div .ln{flex:1;max-width:55px;height:1px;background:var(--tc);opacity:0.5;}
.sec-div .sc{font-size:0.65rem;color:var(--tc-light);letter-spacing:0.14em;}
.add-lamp-btn{background:var(--tc-dim);border:1px solid var(--tc);color:var(--tc-light);padding:5px 14px;font-family:'Nunito',sans-serif;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;border-radius:2px;margin-top:10px;}
.add-lamp-btn:hover{background:rgba(184,88,48,0.3);color:var(--cream);}
.add-lamp-form{background:var(--navy-dark);border:1px solid var(--tc);border-radius:3px;padding:16px 20px;margin:12px 24px;display:none;}
.add-lamp-form h3{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--cream);margin-bottom:12px;letter-spacing:0.06em;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;margin-bottom:12px;}
.form-grid label{font-size:0.66rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;display:block;margin-bottom:3px;}
.form-grid input,.form-grid textarea{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:var(--text);padding:5px 8px;font-size:0.76rem;border-radius:2px;font-family:'Nunito',sans-serif;}
.form-grid input:focus,.form-grid textarea:focus{outline:1px solid var(--tc);}
.form-grid .full{grid-column:1/-1;}
.form-grid textarea{resize:vertical;min-height:50px;}
.link-inputs{margin-bottom:12px;}
.link-inputs label{font-size:0.66rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;display:block;margin-bottom:6px;}
.link-row{display:flex;gap:6px;margin-bottom:6px;align-items:center;}
.link-row input{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:var(--text);padding:5px 8px;font-size:0.72rem;border-radius:2px;font-family:'Nunito',sans-serif;}
.link-row .lbl{font-size:0.62rem;color:var(--muted);width:36px;flex-shrink:0;text-align:right;}
.form-btns{display:flex;gap:8px;}
.form-submit{background:var(--tc);border:none;color:var(--cream);padding:7px 18px;font-family:'Nunito',sans-serif;font-size:0.74rem;letter-spacing:0.08em;cursor:pointer;border-radius:2px;}
.form-cancel{background:transparent;border:1px solid rgba(255,255,255,0.15);color:var(--muted);padding:7px 14px;font-family:'Nunito',sans-serif;font-size:0.74rem;cursor:pointer;border-radius:2px;}
.lamp-card{padding:22px 24px 18px;border-bottom:1px solid var(--border);scroll-margin-top:72px;}
.lamp-card.done{opacity:0.75;}
.lamp-title{display:flex;flex-wrap:wrap;align-items:center;gap:9px;margin-bottom:5px;}
.lamp-num{font-family:'Cormorant Garamond',serif;font-size:0.9rem;color:var(--tc);font-weight:500;letter-spacing:0.08em;}
.lamp-name{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:500;color:var(--cream);letter-spacing:0.03em;line-height:1.2;}
.lamp-ht{display:inline-flex;align-items:center;gap:4px;font-size:0.82rem;font-weight:600;color:var(--cream);letter-spacing:0.06em;text-transform:uppercase;background:var(--tc);padding:3px 10px 3px 8px;border-radius:3px;white-space:nowrap;flex-shrink:0;}
.lamp-ht::before{content:'\2195';font-size:0.76rem;opacity:0.85;}
.lamp-note{font-size:0.67rem;color:var(--muted);font-style:italic;letter-spacing:0.04em;margin-bottom:13px;}
.card-body{display:flex;gap:18px;align-items:flex-start;}
.panel-left{flex:1;min-width:0;}
.panel-right{flex:0 0 195px;min-width:0;}
.gallery{background:var(--navy-dark);border-radius:3px;overflow:hidden;}
.gal-main{width:100%;height:var(--img-h);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.gal-main img{width:100%;height:100%;object-fit:contain;display:block;}
.gal-ph{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--muted);font-size:0.72rem;letter-spacing:0.07em;text-align:center;padding:20px;}
.gal-ph .ico{font-size:2rem;opacity:0.22;}
.img-note{background:rgba(184,88,48,0.1);border-left:3px solid var(--tc);padding:5px 10px;font-size:0.64rem;color:var(--tc-light);letter-spacing:0.05em;}
.thumb-strip{display:flex;gap:5px;padding:6px 10px;overflow-x:auto;background:rgba(0,0,0,0.15);scrollbar-width:thin;scrollbar-color:var(--tc) transparent;}
.thumb{width:44px;height:44px;flex-shrink:0;border:2px solid transparent;border-radius:2px;overflow:hidden;cursor:pointer;background:var(--navy-dark);}
.thumb.active{border-color:var(--tc);}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.img-controls{padding:7px 10px;background:rgba(0,0,0,0.2);display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.img-controls label.upload-btn{background:var(--tc);color:var(--cream);padding:4px 10px;font-size:0.67rem;letter-spacing:0.07em;border-radius:2px;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:'Nunito',sans-serif;}
.img-controls label.upload-btn:hover{background:var(--tc-light);}
.img-controls input[type="file"]{display:none;}
.img-controls input[type="text"]{flex:1;min-width:100px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--text);padding:4px 7px;font-size:0.68rem;border-radius:2px;font-family:monospace;}
.img-controls input[type="text"]::placeholder{color:var(--muted);}
.img-controls input[type="text"]:focus{outline:1px solid var(--tc);}
.img-controls button{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--text);padding:4px 8px;font-size:0.65rem;border-radius:2px;cursor:pointer;font-family:'Nunito',sans-serif;}
.img-controls button:hover{background:rgba(255,255,255,0.12);}
.links-bar{display:flex;justify-content:space-between;align-items:flex-start;gap:4px;margin-top:9px;}
.link-slot{display:flex;flex-direction:column;gap:2px;}
.link-slot.left{align-items:flex-start;text-align:left;}
.link-slot.center{align-items:center;text-align:center;flex:1;}
.link-slot.right{align-items:flex-end;text-align:right;}
.link-slot a{color:var(--tc-light);font-size:0.74rem;letter-spacing:0.04em;text-decoration:none;border-bottom:1px solid rgba(212,112,61,0.3);padding-bottom:1px;}
.link-slot a:hover{color:var(--cream);border-bottom-color:var(--tc);}
.link-info{font-size:0.6rem;color:var(--muted);letter-spacing:0.04em;}
.link-empty{width:70px;}
.rating-area{background:var(--card);border:1px solid var(--border);border-radius:3px;padding:14px 12px;}
.rater-block{text-align:center;margin-bottom:12px;}
.rater-block:last-of-type{margin-bottom:0;}
.rater-name{font-size:0.64rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--tc-light);margin-bottom:8px;}
.stars{display:flex;gap:2px;justify-content:center;}
.star-wrap{position:relative;width:1.8rem;height:1.8rem;cursor:pointer;flex-shrink:0;}
.star-wrap svg{width:100%;height:100%;display:block;}
.star-bg{fill:var(--star-off);}
.star-left,.star-right{fill:var(--star-off);transition:fill 0.1s;}
.star-left-hit,.star-right-hit{position:absolute;top:0;height:100%;width:50%;cursor:pointer;}
.star-left-hit{left:0;}
.star-right-hit{right:0;}
.score-disp{margin-top:5px;height:15px;font-size:0.64rem;color:var(--tc-light);letter-spacing:0.08em;}
.rater-divider{height:1px;background:var(--border);margin:10px 0;}
.result-block{display:none;text-align:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.res-label{font-size:0.58rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:2px;}
.res-scores{font-size:0.68rem;color:var(--text);margin-bottom:5px;}
.res-avg{font-family:'Cormorant Garamond',serif;font-size:1.9rem;color:var(--tc);font-weight:500;line-height:1;}
.res-avg-label{font-size:0.58rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-top:1px;}
.bottom-nav-bar{background:var(--navy-dark);border-top:2px solid var(--tc);padding:12px 20px;max-width:960px;width:100%;margin:0 auto;}
.bnav-inner{display:flex;align-items:center;gap:12px;justify-content:space-between;flex-wrap:wrap;}
.bnav-info{font-size:0.67rem;color:var(--muted);letter-spacing:0.05em;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bnav-prog-wrap{display:flex;align-items:center;gap:7px;}
.bnav-label{font-size:0.65rem;color:var(--muted);white-space:nowrap;}
.bnav-track{width:120px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;}
.bnav-fill{height:100%;background:var(--tc);border-radius:2px;transition:width 0.4s;}
.bnav-btns{display:flex;gap:7px;align-items:center;flex-shrink:0;}
.bnav-btn{background:transparent;border:1px solid rgba(255,255,255,0.15);color:var(--text);padding:7px 14px;font-family:'Nunito',sans-serif;font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:background 0.15s;white-space:nowrap;}
.bnav-btn:hover{background:rgba(255,255,255,0.07);}
.bnav-btn:disabled{opacity:0.28;cursor:not-allowed;}
.bnav-btn.primary{background:var(--tc);border-color:var(--tc);color:var(--cream);font-weight:600;}
.bnav-btn.primary:hover{background:var(--tc-light);}
#summary{display:none;padding:28px 24px 40px;max-width:960px;margin:0 auto;}
.sum-hdr{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--cream);margin-bottom:4px;}
.sum-sub{font-size:0.7rem;color:var(--muted);letter-spacing:0.09em;margin-bottom:20px;}
.sum-sec{font-size:0.63rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--tc);margin:18px 0 7px;padding-bottom:5px;border-bottom:1px solid rgba(184,88,48,0.35);}
table.rtbl{width:100%;border-collapse:collapse;}
table.rtbl th{font-size:0.61rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--tc-light);text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);}
table.rtbl td{padding:7px 8px;font-size:0.76rem;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:middle;}
table.rtbl tr:hover td{background:rgba(255,255,255,0.02);}
.td-rk{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--tc);width:24px;}
.td-nm{color:var(--cream);}
.td-av{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--tc-light);text-align:center;width:48px;}
.td-sc{font-size:0.65rem;color:var(--muted);text-align:center;width:64px;}
.td-lk a{color:var(--tc-light);font-size:0.65rem;text-decoration:none;}
.td-lk a:hover{color:var(--cream);}
.restart{margin-top:22px;display:block;width:fit-content;background:transparent;border:1px solid var(--tc);color:var(--tc-light);padding:8px 20px;font-family:'Nunito',sans-serif;font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;border-radius:2px;}
.restart:hover{background:var(--tc-dim);color:var(--cream);}
@media(max-width:620px){
  .card-body{flex-direction:column;}
  .panel-right{flex:none;width:100%;}
  .rating-area{display:flex;gap:18px;justify-content:center;padding:10px;}
  .rater-divider{display:none;}
  .rater-block{margin-bottom:0;}
  .star-wrap{width:2rem;height:2rem;}
  .result-block{border-top:none;margin-top:0;padding-top:0;}
  .gal-main{height:220px;}
  .links-bar{flex-wrap:wrap;}
  .bnav-inner{flex-direction:column;gap:8px;align-items:stretch;}
  .bnav-info{white-space:normal;}
}
</style>
</head>

   links:[{store:'Target',url:'https://www.target.com/p/amber-glass-table-lamp-brown-threshold-8482/-/A-90043269#lnk=sametab',info:'5% RedCard + 20% vet'},{store:'Amazon (similar)',url:'https://www.amazon.com/s?k=amber+glass+table+lamp+accent+small',info:'Similar amber glass'},{store:'CB2 (similar)',url:'https://www.cb2.com/arie-amber-glass-table-lamp/s447078',info:'Arie amber — compare'}]}
];

// ─── STATE ────────────────────────────────────────────────────────────────────
var scores = {};
var extraImages = {};
var currentIdx = 0;
var showingSummary = false;
var saveTimer = null;

function total() { return LAMPS.length; }

// ─── SUPABASE SYNC ────────────────────────────────────────────────────────────
function loadScores() {
  setStatus('Loading saved scores...', 'loading');
  supaFetch('lamp_scores?select=lamp_id,brad_score,wes_score').then(function(rows) {
    if (!Array.isArray(rows)) { setStatus('', ''); return; }
    rows.forEach(function(row) {
      if (row.lamp_id && row.brad_score && row.wes_score) {
        scores[row.lamp_id] = { Brad: row.brad_score, Wes: row.wes_score };
      }
    });
    // Restore UI for saved scores
    Object.keys(scores).forEach(function(id) {
      var s = scores[id];
      ['Brad','Wes'].forEach(function(name) {
        var val = s[name];
        if (!val) return;
        renderStars(id, name, val);
        var disp = document.getElementById('sd-'+id+'-'+name);
        if (disp) {
          var full = Math.floor(val); var half = (val % 1 !== 0);
          disp.textContent = '\u2605'.repeat(full) + (half ? '\u00BD' : '') + ' ' + val + '/5';
        }
      });
      showResult(id);
      var card = document.getElementById('card-' + id);
      if (card) card.classList.add('done');
    });
    updateProgress();
    updateBottomNav();
    setStatus('', '');
  }).catch(function() { setStatus('', ''); });
}

function saveScore(id) {
  var s = scores[id];
  if (!s || !s.Brad || !s.Wes) return;
  setStatus('Saving...', 'saving');
  supaFetch('lamp_scores', 'POST', {
    lamp_id: id,
    brad_score: s.Brad,
    wes_score: s.Wes,
    updated_at: new Date().toISOString()
  }).then(function() {
    setStatus('Saved', 'saved');
  }).catch(function() {
    setStatus('Save failed — check connection', 'error');
  });
}

// ─── BUILD DOM ────────────────────────────────────────────────────────────────
function buildAll() {
  var view = document.getElementById('view');
  view.innerHTML = '';
  var prevSec = null;
  LAMPS.forEach(function(lamp, i) {
    if (lamp.sec !== prevSec) {
      prevSec = lamp.sec;
      view.appendChild(buildSecDiv(lamp.sec));
    }
    view.appendChild(buildCard(lamp, i));
  });
}

function buildSecDiv(sec) {
  var d = document.createElement('div');
  d.className = 'sec-div';
  d.id = 'sec-' + sec;
  var cnt = LAMPS.filter(function(l){ return l.sec === sec; }).length;
  d.innerHTML =
    '<h2>' + (sec === 'bedside' ? 'Bedside Lamps' : 'Accent Lamps') + '</h2>' +
    '<div class="sec-line"><span class="ln"></span><span class="sc" id="cnt-'+sec+'">' + cnt + ' lamps</span><span class="ln"></span></div>' +
    '<br><button class="add-lamp-btn" onclick="toggleAddForm(\'' + sec + '\')">+ Add Lamp</button>';
  var form = document.createElement('div');
  form.className = 'add-lamp-form';
  form.id = 'add-form-' + sec;
  form.innerHTML =
    '<h3>Add a New ' + (sec === 'bedside' ? 'Bedside' : 'Accent') + ' Lamp</h3>' +
    '<div class="form-grid">' +
      '<div><label>Lamp Name *</label><input type="text" id="af-name-'+sec+'" placeholder="e.g. West Elm Ribbed Glass"></div>' +
      '<div><label>Height</label><input type="text" id="af-ht-'+sec+'" placeholder="e.g. 22&quot;H"></div>' +
      '<div><label>Brand</label><input type="text" id="af-brand-'+sec+'" placeholder="e.g. West Elm"></div>' +
      '<div><label>Image URL</label><input type="text" id="af-img-'+sec+'" placeholder="https://..."></div>' +
      '<div class="full"><label>Notes</label><textarea id="af-note-'+sec+'" placeholder="Optional notes"></textarea></div>' +
    '</div>' +
    '<div class="link-inputs"><label>Purchase Links</label>' +
      '<div class="link-row"><span class="lbl">Left</span><input type="text" id="af-ls-'+sec+'" placeholder="Store name"><input type="text" id="af-lu-'+sec+'" placeholder="https://..."><input type="text" id="af-li-'+sec+'" placeholder="Info"></div>' +
      '<div class="link-row"><span class="lbl">Center</span><input type="text" id="af-cs-'+sec+'" placeholder="Store name"><input type="text" id="af-cu-'+sec+'" placeholder="https://..."><input type="text" id="af-ci-'+sec+'" placeholder="Info"></div>' +
      '<div class="link-row"><span class="lbl">Right</span><input type="text" id="af-rs-'+sec+'" placeholder="Store name"><input type="text" id="af-ru-'+sec+'" placeholder="https://..."><input type="text" id="af-ri-'+sec+'" placeholder="Info"></div>' +
    '</div>' +
    '<div class="form-btns"><button class="form-submit" onclick="submitAddForm(\'' + sec + '\')">Add Lamp</button><button class="form-cancel" onclick="toggleAddForm(\'' + sec + '\')">Cancel</button></div>';
  d.appendChild(form);
  return d;
}

function toggleAddForm(sec) {
  var f = document.getElementById('add-form-' + sec);
  if (f) f.style.display = f.style.display === 'block' ? 'none' : 'block';
}

function submitAddForm(sec) {
  var g = function(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; };
  var name = g('af-name-' + sec);
  if (!name) { alert('Please enter a lamp name.'); return; }
  var existing = LAMPS.filter(function(l){ return l.sec === sec; });
  var nums = existing.map(function(l){ return parseInt(l.id.replace(/[^0-9]/g,''))||0; });
  var newId = (sec === 'bedside' ? 'B' : 'A') + (Math.max.apply(null, nums.concat([0])) + 1);
  var links = [];
  [['ls','lu','li'],['cs','cu','ci'],['rs','ru','ri']].forEach(function(k) {
    var s = g('af-'+k[0]+'-'+sec), u = g('af-'+k[1]+'-'+sec), i = g('af-'+k[2]+'-'+sec);
    if (s && u) links.push({store:s, url:u, info:i});
  });
  var lamp = {sec:sec, id:newId, name:name, brand:g('af-brand-'+sec), height:g('af-ht-'+sec), note:g('af-note-'+sec), img:g('af-img-'+sec), links:links};
  LAMPS.push(lamp);
  var view = document.getElementById('view');
  var lastCard = null;
  LAMPS.forEach(function(l) {
    if (l.sec === sec && l.id !== newId) { var el = document.getElementById('card-'+l.id); if (el) lastCard = el; }
  });
  var newCard = buildCard(lamp, LAMPS.length-1);
  if (lastCard && lastCard.nextSibling) view.insertBefore(newCard, lastCard.nextSibling);
  else view.appendChild(newCard);
  var cntEl = document.getElementById('cnt-'+sec);
  if (cntEl) cntEl.textContent = LAMPS.filter(function(l){ return l.sec===sec; }).length + ' lamps';
  toggleAddForm(sec);
  updateProgress();
  updateBottomNav();
  newCard.scrollIntoView({behavior:'smooth', block:'start'});
}

function buildCard(lamp, idx) {
  var card = document.createElement('div');
  card.className = 'lamp-card';
  card.id = 'card-' + lamp.id;
  var title = document.createElement('div');
  title.className = 'lamp-title';
  title.innerHTML = '<span class="lamp-num">'+esc(lamp.id)+'</span><span class="lamp-name">'+esc(lamp.name)+'</span>' + (lamp.height?'<span class="lamp-ht">'+esc(lamp.height)+'</span>':'');
  card.appendChild(title);
  if (lamp.note) { var n=document.createElement('div'); n.className='lamp-note'; n.textContent=lamp.note; card.appendChild(n); }
  var body = document.createElement('div');
  body.className = 'card-body';
  // LEFT: image
  var left = document.createElement('div');
  left.className = 'panel-left';
  var gallery = document.createElement('div');
  gallery.className = 'gallery';
  var main = document.createElement('div');
  main.className = 'gal-main';
  main.id = 'gm-' + lamp.id;
  if (lamp.img) {
    var pi = document.createElement('img');
    pi.src = lamp.img; pi.alt = lamp.name;
    pi.onerror = function() { main.innerHTML='<div class="gal-ph"><span class="ico">\u26A0</span><span>Image failed — paste URL below</span></div>'; };
    main.appendChild(pi);
    if (!extraImages[lamp.id]) extraImages[lamp.id] = [lamp.img];
  } else {
    main.innerHTML='<div class="gal-ph"><span class="ico">\uD83D\uDDBC\uFE0F</span><span>Upload images below</span></div>';
    if (!extraImages[lamp.id]) extraImages[lamp.id] = [];
  }
  gallery.appendChild(main);
  if (lamp.imgNote) { var in2=document.createElement('div'); in2.className='img-note'; in2.textContent='\u26A0 '+lamp.imgNote; gallery.appendChild(in2); }
  var strip = document.createElement('div');
  strip.className='thumb-strip'; strip.id='strip-'+lamp.id;
  if (lamp.img) {
    var th0=document.createElement('div'); th0.className='thumb active'; th0.setAttribute('data-ti',0);
    var ti0=document.createElement('img'); ti0.src=lamp.img; th0.appendChild(ti0);
    th0.addEventListener('click', makeThumbClick(lamp.id,lamp.img,0)); strip.appendChild(th0);
    strip.style.display='flex';
  } else { strip.style.display='none'; }
  gallery.appendChild(strip);
  var ctrl=document.createElement('div'); ctrl.className='img-controls';
  var fileId='file-'+lamp.id;
  ctrl.innerHTML='<label class="upload-btn" for="'+fileId+'">\u2191 Upload More</label><input type="file" id="'+fileId+'" accept="image/*" multiple><input type="text" id="url-'+lamp.id+'" placeholder="Paste image URL\u2026"><button onclick="applyUrl(\''+lamp.id+'\')">Add</button>';
  gallery.appendChild(ctrl);
  setTimeout(function(){ var fi=document.getElementById(fileId); if(fi) fi.addEventListener('change',function(e){ handleUpload(lamp.id,e.target.files); }); },0);
  left.appendChild(gallery);
  left.appendChild(buildLinksBar(lamp.links));
  body.appendChild(left);
  // RIGHT: rating
  var right=document.createElement('div'); right.className='panel-right';
  var ra=document.createElement('div'); ra.className='rating-area'; ra.id='ra-'+lamp.id;
  ['Brad','Wes'].forEach(function(name,ni) {
    if(ni>0){var div=document.createElement('div');div.className='rater-divider';ra.appendChild(div);}
    var block=document.createElement('div'); block.className='rater-block';
    block.innerHTML='<div class="rater-name">'+name+'</div>';
    var sd2=document.createElement('div'); sd2.className='stars'; sd2.id='stars-'+lamp.id+'-'+name;
    for(var s=1;s<=5;s++){ sd2.appendChild(buildStarWrap(lamp.id,name,s)); }
    block.appendChild(sd2);
    var disp=document.createElement('div'); disp.className='score-disp'; disp.id='sd-'+lamp.id+'-'+name;
    block.appendChild(disp); ra.appendChild(block);
  });
  var rb=document.createElement('div'); rb.className='result-block'; rb.id='rb-'+lamp.id; ra.appendChild(rb);
  right.appendChild(ra); body.appendChild(right); card.appendChild(body);
  return card;
}

function buildLinksBar(links) {
  var bar=document.createElement('div'); bar.className='links-bar';
  ['left','center','right'].forEach(function(pos,i){
    var slot=document.createElement('div'); var lnk=links&&links[i];
    if(lnk){
      slot.className='link-slot '+pos;
      slot.innerHTML='<a href="'+lnk.url+'" target="_blank" rel="noopener">'+esc(lnk.store)+' \u2197</a>'+(lnk.info?'<span class="link-info">'+esc(lnk.info)+'</span>':'');
    } else { slot.className='link-empty'; }
    bar.appendChild(slot);
  });
  return bar;
}

// ─── IMAGE ────────────────────────────────────────────────────────────────────
function makeThumbClick(id,src,idx){
  return function(){
    setMainImg(id,src);
    var strip=document.getElementById('strip-'+id);
    if(strip) strip.querySelectorAll('.thumb').forEach(function(t){ t.classList.toggle('active',+t.getAttribute('data-ti')===idx); });
  };
}
function setMainImg(id,src){
  var main=document.getElementById('gm-'+id); if(!main)return;
  main.innerHTML=''; var img=document.createElement('img'); img.src=src; img.alt='Lamp image';
  img.onerror=function(){ main.innerHTML='<div class="gal-ph"><span class="ico">\u26A0</span><span>Image failed to load</span></div>'; };
  main.appendChild(img);
}
function handleUpload(id,files){
  if(!files||!files.length)return;
  Array.from(files).forEach(function(file){ var r=new FileReader(); r.onload=function(e){ addImageSrc(id,e.target.result); }; r.readAsDataURL(file); });
}
function applyUrl(id){
  var input=document.getElementById('url-'+id); var url=(input.value||'').trim(); if(!url)return;
  addImageSrc(id,url); input.value='';
}
function addImageSrc(id,src){
  if(!extraImages[id]) extraImages[id]=[];
  var idx=extraImages[id].length; extraImages[id].push(src);
  var strip=document.getElementById('strip-'+id); if(!strip)return;
  var th=document.createElement('div'); th.className='thumb'; th.setAttribute('data-ti',idx);
  var img=document.createElement('img'); img.src=src; th.appendChild(img);
  th.addEventListener('click',makeThumbClick(id,src,idx)); strip.appendChild(th);
  strip.style.display='flex'; setMainImg(id,src);
  strip.querySelectorAll('.thumb').forEach(function(t){ t.classList.toggle('active',+t.getAttribute('data-ti')===idx); });
}

// ─── STARS ────────────────────────────────────────────────────────────────────
function makeHovIn(id,name,val){return function(){ if(scores[id]&&scores[id][name])return; getStars(id,name).forEach(function(s){s.classList.toggle('hov',+s.getAttribute('data-v')<=val);}); };}
function makeHovOut(id,name){return function(){ getStars(id,name).forEach(function(s){s.classList.remove('hov');}); };}
function makeClick(id,name,val){
  return function(){
    if(!scores[id]) scores[id]={};
    scores[id][name]=val;
    getStars(id,name).forEach(function(s){ s.classList.toggle('sel',+s.getAttribute('data-v')<=val); s.classList.remove('hov'); });
    var sd=document.getElementById('sd-'+id+'-'+name); if(sd) sd.textContent='\u2605'.repeat(val)+' '+val+'/5';
    checkBothRated(id);
  };
}
function getStars(id,name){ var el=document.getElementById('stars-'+id+'-'+name); return el?Array.from(el.querySelectorAll('.star')):[];}
function checkBothRated(id){
  var s=scores[id]; if(!s||!s.Brad||!s.Wes)return;
  showResult(id);
  var card=document.getElementById('card-'+id); if(card) card.classList.add('done');
  saveScore(id);
  updateProgress(); updateBottomNav();
}
function showResult(id){
  var s=scores[id]; if(!s||!s.Brad||!s.Wes)return;
  var avg=((s.Brad+s.Wes)/2).toFixed(1);
  var rb=document.getElementById('rb-'+id);
  if(rb){ rb.style.display='block'; rb.innerHTML='<div class="res-label">Scores</div><div class="res-scores">Brad: '+s.Brad+' &middot; Wes: '+s.Wes+'</div><div class="res-avg">'+avg+'</div><div class="res-avg-label">avg</div>'; }
}

// ─── NAV ──────────────────────────────────────────────────────────────────────
function navTo(idx){ if(idx<0||idx>=LAMPS.length)return; currentIdx=idx; var card=document.getElementById('card-'+LAMPS[idx].id); if(card) card.scrollIntoView({behavior:'smooth',block:'start'}); updateBottomNav(); }
function navNext(){ if(currentIdx<LAMPS.length-1) navTo(currentIdx+1); else showSummary(); }
window.addEventListener('scroll',function(){
  if(showingSummary)return;
  var best=0;
  for(var i=0;i<LAMPS.length;i++){ var el=document.getElementById('card-'+LAMPS[i].id); if(el&&el.getBoundingClientRect().top<=100) best=i; }
  if(best!==currentIdx){ currentIdx=best; updateBottomNav(); }
},{passive:true});
function updateBottomNav(){
  var lamp=LAMPS[currentIdx]; var name=lamp?lamp.id+': '+lamp.name:'';
  if(name.length>55) name=name.substring(0,55)+'\u2026';
  var infoEl=document.getElementById('bnav-info'); if(infoEl) infoEl.textContent='Lamp '+(currentIdx+1)+' of '+total()+' \u2014 '+name;
  var backBtn=document.getElementById('btn-back'); if(backBtn) backBtn.disabled=currentIdx===0;
  var rated=Object.keys(scores).filter(function(k){return scores[k].Brad&&scores[k].Wes;}).length;
  var summBtn=document.getElementById('btn-summary'); if(summBtn) summBtn.style.display=rated>0?'inline-block':'none';
  var nextBtn=document.getElementById('btn-next'); if(nextBtn) nextBtn.textContent=currentIdx===LAMPS.length-1?'See Results \u2192':'Next \u2192';
}

// ─── PROGRESS ─────────────────────────────────────────────────────────────────
function updateProgress(){
  var rated=Object.keys(scores).filter(function(k){return scores[k].Brad&&scores[k].Wes;}).length;
  var tot=total(); var pct=tot>0?Math.round(rated/tot*100):0;
  var txt=rated+' of '+tot+' rated';
  document.getElementById('pt').textContent=txt; document.getElementById('pf').style.width=pct+'%'; document.getElementById('pp').textContent=pct+'%';
  document.getElementById('bnav-pt').textContent=txt; document.getElementById('bnav-pf').style.width=pct+'%'; document.getElementById('bnav-pp').textContent=pct+'%';
}

// ─── SUMMARY ──────────────────────────────────────────────────────────────────
function showSummary(){
  showingSummary=true;
  var el=document.getElementById('summary'); el.style.display='block'; el.scrollIntoView({behavior:'smooth',block:'start'});
  var unrated=LAMPS.filter(function(l){return !scores[l.id]||!scores[l.id].Brad||!scores[l.id].Wes;}).length;
  function ranked(sec){ return LAMPS.filter(function(l){return l.sec===sec&&scores[l.id]&&scores[l.id].Brad&&scores[l.id].Wes;}).map(function(l){return{l:l,avg:(scores[l.id].Brad+scores[l.id].Wes)/2,b:scores[l.id].Brad,w:scores[l.id].Wes};}).sort(function(a,b){return b.avg-a.avg;}); }
  function tbl(items){
    if(!items.length) return '<p style="color:var(--muted);font-size:0.75rem">No lamps rated yet.</p>';
    return '<table class="rtbl"><thead><tr><th>#</th><th>Lamp</th><th style="text-align:center">Avg</th><th style="text-align:center">B/W</th><th>Link</th></tr></thead><tbody>'+
      items.map(function(it,i){ var lk=it.l.links&&it.l.links[0]?'<a href="'+it.l.links[0].url+'" target="_blank" rel="noopener">'+esc(it.l.links[0].store)+' \u2197</a>':'\u2014';
        return '<tr><td class="td-rk">'+(i+1)+'</td><td class="td-nm">'+esc(it.l.id)+' &middot; '+esc(it.l.name)+(it.l.height?' <small style="color:var(--tc-light);font-size:0.62rem">('+esc(it.l.height)+')</small>':'')+'</td><td class="td-av">'+it.avg.toFixed(1)+'</td><td class="td-sc">'+it.b+'/'+it.w+'</td><td class="td-lk">'+lk+'</td></tr>';
      }).join('')+'</tbody></table>';
  }
  el.innerHTML='<div class="sum-hdr">Results</div><div class="sum-sub">'+(total()-unrated)+' of '+total()+' lamps rated &middot; ranked by average score</div>'+
    '<div class="sum-sec">Bedside Lamps</div>'+tbl(ranked('bedside'))+'<div class="sum-sec">Accent Lamps</div>'+tbl(ranked('accent'))+
    (unrated>0?'<div class="sum-sec" style="margin-top:20px">Unrated ('+unrated+')</div><p style="font-size:0.7rem;color:var(--muted)">'+LAMPS.filter(function(l){return !scores[l.id]||!scores[l.id].Brad||!scores[l.id].Wes;}).map(function(l){return l.id;}).join(', ')+'</p>':'')+
    '<button class="restart" onclick="location.reload()">Start Over</button>';
  document.getElementById('bnav-info').textContent='Summary';
  document.getElementById('btn-next').style.display='none';
  document.getElementById('btn-back').style.display='none';
  var sb=document.getElementById('btn-summary'); if(sb){sb.textContent='\u2190 Back to Lamps';sb.onclick=backFromSummary;sb.style.display='inline-block';}
}
function backFromSummary(){
  showingSummary=false;
  document.getElementById('summary').style.display='none';
  document.getElementById('btn-next').style.display='';
  document.getElementById('btn-back').style.display='';
  var sb=document.getElementById('btn-summary'); if(sb){sb.textContent='Results';sb.onclick=showSummary;}
  navTo(currentIdx);
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ─── INIT ─────────────────────────────────────────────────────────────────────
buildAll();
loadScores();
</script>
