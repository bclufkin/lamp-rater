<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bedroom Rater — Brad & Wes</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Nunito:wght@300;400;600&display=swap');
:root{
  --navy:#22304A;--navy-dark:#1A2538;--plum:#252030;
  --tc:#B85830;--tc-light:#D4703D;--tc-dim:rgba(184,88,48,0.15);
  --cream:#F2EDE6;--text:#E8E2D8;--muted:rgba(232,226,216,0.45);
  --star-on:#D4703D;--star-off:rgba(255,255,255,0.16);
  --card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.07);
  --img-h:320px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--navy);color:var(--text);font-family:'Nunito',system-ui,sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column;}
.tab-nav{background:var(--navy-dark);border-bottom:2px solid var(--tc);display:flex;}
.tab-btn{background:transparent;border:none;color:var(--muted);padding:10px 20px;font-family:'Nunito',sans-serif;font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color 0.15s,border-color 0.15s;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--tc-light);border-bottom-color:var(--tc);}
.tab-content{display:none;flex:1;flex-direction:column;}
.tab-content.active{display:flex;}
.hdr{background:var(--navy-dark);padding:12px 24px 10px;text-align:center;}
.hdr h1{font-family:'Cormorant Garamond',serif;font-size:1.55rem;font-weight:700;letter-spacing:0.1em;color:var(--cream);text-transform:uppercase;}
.version{font-size:0.6rem;color:var(--muted);letter-spacing:0.12em;margin-top:2px;}
.sync-status{font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;height:14px;transition:color 0.3s;}
.sync-status.saving{color:var(--tc-light);}
.sync-status.saved{color:rgba(120,200,120,0.8);}
.sync-status.error{color:rgba(220,80,80,0.8);}
.sync-status.loading{color:var(--muted);}
.prog-row{display:flex;align-items:center;gap:10px;justify-content:center;margin-top:7px;}
.prog-label{font-size:0.68rem;color:var(--muted);letter-spacing:0.06em;white-space:nowrap;}
.prog-track{width:200px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--tc);border-radius:2px;transition:width 0.4s;}
.placeholder-page{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:60px 24px;text-align:center;}
.placeholder-page h2{font-family:'Cormorant Garamond',serif;font-size:2rem;color:var(--cream);letter-spacing:0.1em;}
.placeholder-page p{font-size:0.85rem;color:var(--muted);max-width:400px;line-height:1.6;}
.placeholder-icon{font-size:3.5rem;opacity:0.25;}
.placeholder-note{font-size:0.72rem;color:var(--tc-light);letter-spacing:0.08em;border:1px solid rgba(184,88,48,0.3);padding:10px 18px;border-radius:3px;}
#view-lamps{flex:1;max-width:960px;width:100%;margin:0 auto;padding:0 0 60px;}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:80px 24px;color:var(--muted);font-size:0.8rem;letter-spacing:0.1em;text-transform:uppercase;}
.loading-spinner{width:32px;height:32px;border:3px solid rgba(184,88,48,0.2);border-top-color:var(--tc);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.sec-div{padding:16px 24px;background:var(--plum);border-top:2px solid var(--tc);border-bottom:2px solid var(--tc);text-align:center;position:sticky;top:0;z-index:50;}
.sec-div h2{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;color:var(--cream);}
.sec-line{display:flex;align-items:center;gap:12px;justify-content:center;margin-top:4px;}
.sec-line .ln{flex:1;max-width:55px;height:1px;background:var(--tc);opacity:0.5;}
.sec-line .sc{font-size:0.65rem;color:var(--tc-light);letter-spacing:0.14em;}
.add-lamp-btn{background:var(--tc-dim);border:1px solid var(--tc);color:var(--tc-light);padding:5px 14px;font-family:'Nunito',sans-serif;font-size:0.67rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;border-radius:2px;margin-top:9px;}
.add-lamp-btn:hover{background:rgba(184,88,48,0.3);color:var(--cream);}
.add-lamp-form{background:var(--navy-dark);border:1px solid var(--tc);border-radius:3px;padding:16px 20px;margin:10px 24px;display:none;}
.add-lamp-form h3{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--cream);margin-bottom:10px;letter-spacing:0.06em;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;margin-bottom:10px;}
.form-grid label,.link-inputs>label{font-size:0.65rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;display:block;margin-bottom:3px;}
.form-hint{font-size:0.6rem;color:var(--muted);font-style:italic;letter-spacing:0.04em;text-transform:none;font-weight:300;}
.form-req{font-size:0.6rem;color:var(--tc-light);font-style:italic;letter-spacing:0.04em;text-transform:none;font-weight:300;}
.form-grid input,.form-grid textarea,.link-row input{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:var(--text);padding:5px 8px;font-size:0.74rem;border-radius:2px;font-family:'Nunito',sans-serif;width:100%;}
.form-grid input:focus,.form-grid textarea:focus,.link-row input:focus{outline:1px solid var(--tc);}
.form-grid .full{grid-column:1/-1;}
.form-grid textarea{resize:vertical;min-height:44px;}
.link-inputs{margin-bottom:10px;}
.link-row{display:flex;gap:5px;margin-bottom:5px;align-items:center;}
.link-row .lbl{font-size:0.6rem;color:var(--muted);width:34px;flex-shrink:0;text-align:right;}
.form-btns{display:flex;gap:8px;}
.form-submit{background:var(--tc);border:none;color:var(--cream);padding:6px 16px;font-family:'Nunito',sans-serif;font-size:0.72rem;letter-spacing:0.08em;cursor:pointer;border-radius:2px;}
.form-cancel{background:transparent;border:1px solid rgba(255,255,255,0.15);color:var(--muted);padding:6px 12px;font-family:'Nunito',sans-serif;font-size:0.72rem;cursor:pointer;border-radius:2px;}
.lamp-card{padding:20px 24px 16px;border-bottom:1px solid var(--border);scroll-margin-top:70px;}
.lamp-card.done{opacity:0.75;}
.lamp-title{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:4px;}
.lamp-num{font-family:'Cormorant Garamond',serif;font-size:0.9rem;color:var(--tc);font-weight:500;letter-spacing:0.08em;}
.lamp-name{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:500;color:var(--cream);letter-spacing:0.03em;line-height:1.2;}
.lamp-ht{display:inline-flex;align-items:center;gap:4px;font-size:0.82rem;font-weight:600;color:var(--cream);letter-spacing:0.06em;text-transform:uppercase;background:var(--tc);padding:3px 10px 3px 8px;border-radius:3px;white-space:nowrap;flex-shrink:0;}
.lamp-ht::before{content:'\2195';font-size:0.76rem;opacity:0.85;}
.lamp-note{font-size:0.66rem;color:var(--muted);font-style:italic;letter-spacing:0.04em;margin-bottom:12px;}
.card-body{display:flex;gap:16px;align-items:flex-start;}
.panel-left{flex:1;min-width:0;}
.panel-right{flex:0 0 200px;min-width:0;display:flex;flex-direction:column;}
.rating-area{flex:1;overflow-y:auto;max-height:var(--img-h);}
.gallery{background:var(--navy-dark);border-radius:3px;overflow:hidden;}
.gal-main{width:100%;height:var(--img-h);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.gal-main img{width:100%;height:100%;object-fit:contain;display:block;}
.gal-ph{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--muted);font-size:0.7rem;letter-spacing:0.07em;text-align:center;padding:20px;}
.gal-ph .ico{font-size:2rem;opacity:0.2;}
.img-note{background:rgba(184,88,48,0.1);border-left:3px solid var(--tc);padding:4px 9px;font-size:0.62rem;color:var(--tc-light);letter-spacing:0.05em;}
.photo-toggle{display:flex;align-items:center;gap:7px;padding:6px 10px;background:rgba(0,0,0,0.18);cursor:pointer;user-select:none;border:none;width:100%;text-align:left;color:var(--muted);font-family:'Nunito',sans-serif;font-size:0.66rem;letter-spacing:0.1em;text-transform:uppercase;}
.photo-toggle:hover{background:rgba(0,0,0,0.28);color:var(--text);}
.photo-toggle .caret{font-size:0.6rem;transition:transform 0.2s;display:inline-block;}
.photo-toggle.open .caret{transform:rotate(90deg);}
.photo-panel{display:none;}
.photo-panel.open{display:block;}
.thumb-strip{display:flex;gap:5px;padding:6px 10px;overflow-x:auto;background:rgba(0,0,0,0.12);scrollbar-width:thin;scrollbar-color:var(--tc) transparent;}
.thumb{width:44px;height:44px;flex-shrink:0;border:2px solid transparent;border-radius:2px;overflow:hidden;cursor:pointer;background:var(--navy-dark);}
.thumb.active{border-color:var(--tc);}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.img-controls{padding:6px 10px;background:rgba(0,0,0,0.2);display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.img-controls label.upload-btn{background:var(--tc);color:var(--cream);padding:4px 10px;font-size:0.65rem;letter-spacing:0.07em;border-radius:2px;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:'Nunito',sans-serif;}
.img-controls label.upload-btn:hover{background:var(--tc-light);}
.img-controls input[type="file"]{display:none;}
.img-controls input[type="text"]{flex:1;min-width:90px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--text);padding:4px 7px;font-size:0.67rem;border-radius:2px;font-family:monospace;}
.img-controls input[type="text"]::placeholder{color:var(--muted);}
.img-controls input[type="text"]:focus{outline:1px solid var(--tc);}
.img-controls button{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--text);padding:4px 8px;font-size:0.64rem;border-radius:2px;cursor:pointer;font-family:'Nunito',sans-serif;}
.img-controls button:hover{background:rgba(255,255,255,0.12);}
.links-bar{display:flex;justify-content:space-between;align-items:flex-start;gap:4px;margin-top:8px;}
.link-slot{display:flex;flex-direction:column;gap:2px;}
.link-slot.left{align-items:flex-start;text-align:left;}
.link-slot.center{align-items:center;text-align:center;flex:1;}
.link-slot.right{align-items:flex-end;text-align:right;}
.link-slot a{color:var(--tc-light);font-size:0.72rem;letter-spacing:0.04em;text-decoration:none;border-bottom:1px solid rgba(212,112,61,0.3);padding-bottom:1px;}
.link-slot a:hover{color:var(--cream);border-bottom-color:var(--tc);}
.link-info{font-size:0.59rem;color:var(--muted);letter-spacing:0.04em;}
.link-empty{width:70px;}
.rating-area{background:var(--card);border:1px solid var(--border);border-radius:3px;padding:13px 11px;}
.rater-block{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;}
.rater-block:last-of-type{margin-bottom:0;}
.rater-name{font-size:0.63rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--tc-light);padding-top:4px;width:34px;flex-shrink:0;text-align:right;}
.rater-right{flex:1;min-width:0;}
.stars{display:flex;gap:2px;justify-content:flex-start;}
.star-wrap{position:relative;width:1.75rem;height:1.75rem;cursor:pointer;flex-shrink:0;}
.star-wrap svg{width:100%;height:100%;display:block;overflow:visible;}
.star-poly{transition:fill 0.1s;}
.star-left-hit,.star-right-hit{position:absolute;top:0;height:100%;width:50%;}
.star-left-hit{left:0;}
.star-right-hit{right:0;}
.score-disp{margin-top:3px;height:14px;font-size:0.63rem;color:var(--tc-light);letter-spacing:0.07em;text-align:left;}
.rating-ctrl-btn{background:transparent;border:1px solid rgba(255,255,255,0.12);color:var(--muted);padding:2px 7px;font-family:'Nunito',sans-serif;font-size:0.58rem;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;border-radius:2px;margin-top:3px;display:block;}
.rating-ctrl-btn:hover{background:rgba(255,255,255,0.07);color:var(--text);}
.rater-divider{height:1px;background:var(--border);margin:9px 0;}
.result-block{display:none;text-align:center;margin-top:9px;padding-top:9px;border-top:1px solid var(--border);}
.res-label{font-size:0.57rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:2px;}
.res-scores{font-size:0.66rem;color:var(--text);margin-bottom:4px;}
.res-avg{font-family:'Cormorant Garamond',serif;font-size:1.85rem;color:var(--tc);font-weight:500;line-height:1;}
.res-avg-label{font-size:0.57rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-top:1px;}
.res-guest{font-size:0.6rem;color:var(--muted);margin-top:4px;}
/* GUEST RATING with stars */
.guest-section{margin-top:9px;padding-top:9px;border-top:1px solid var(--border);}
.guest-label{font-size:0.6rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;text-align:center;}
.guest-name-row{display:flex;gap:5px;align-items:center;margin-bottom:5px;}
.guest-name-row input{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:var(--text);padding:4px 7px;font-size:0.68rem;border-radius:2px;font-family:'Nunito',sans-serif;}
.guest-name-row input:focus{outline:1px solid var(--tc);}
.guest-stars-row{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:5px;}
.guest-stars-and-note{display:flex;align-items:flex-start;gap:6px;margin-bottom:5px;}
.guest-stars-and-note .stars{flex-shrink:0;flex-wrap:nowrap;}
.guest-note-inline{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--text);padding:4px 7px;font-size:0.63rem;border-radius:2px;font-family:'Nunito',sans-serif;resize:none;height:2.4rem;line-height:1.3;min-width:0;}
.guest-note-inline:focus{outline:1px solid var(--tc);}
.guest-submit{display:block;width:100%;background:var(--tc-dim);border:1px solid var(--tc);color:var(--tc-light);padding:4px;font-family:'Nunito',sans-serif;font-size:0.64rem;letter-spacing:0.08em;cursor:pointer;border-radius:2px;text-align:center;}
.guest-submit:hover{background:rgba(184,88,48,0.3);}
.bottom-nav-bar{background:var(--navy-dark);border-top:2px solid var(--tc);padding:11px 20px;max-width:960px;width:100%;margin:0 auto;}
.bnav-inner{display:flex;align-items:center;gap:10px;justify-content:space-between;flex-wrap:wrap;}
.bnav-info{font-size:0.65rem;color:var(--muted);letter-spacing:0.05em;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bnav-prog-wrap{display:flex;align-items:center;gap:6px;}
.bnav-label{font-size:0.63rem;color:var(--muted);white-space:nowrap;}
.bnav-track{width:110px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;}
.bnav-fill{height:100%;background:var(--tc);border-radius:2px;transition:width 0.4s;}
.bnav-btns{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.bnav-btn{background:transparent;border:1px solid rgba(255,255,255,0.15);color:var(--text);padding:6px 13px;font-family:'Nunito',sans-serif;font-size:0.7rem;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:background 0.15s;white-space:nowrap;}
.bnav-btn:hover{background:rgba(255,255,255,0.07);}
.bnav-btn:disabled{opacity:0.28;cursor:not-allowed;}
.bnav-btn.primary{background:var(--tc);border-color:var(--tc);color:var(--cream);font-weight:600;}
.bnav-btn.primary:hover{background:var(--tc-light);}
#summary-lamps{display:none;padding:26px 24px 40px;max-width:960px;margin:0 auto;}
.sum-hdr{font-family:'Cormorant Garamond',serif;font-size:1.55rem;color:var(--cream);margin-bottom:4px;}
.sum-sub{font-size:0.68rem;color:var(--muted);letter-spacing:0.09em;margin-bottom:18px;}
.sum-sec{font-size:0.62rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--tc);margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid rgba(184,88,48,0.35);}
table.rtbl{width:100%;border-collapse:collapse;}
table.rtbl th{font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--tc-light);text-align:left;padding:5px 7px;border-bottom:1px solid var(--border);}
table.rtbl th.tc{text-align:center;}
table.rtbl td{padding:6px 7px;font-size:0.74rem;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:middle;}
table.rtbl tr:hover td{background:rgba(255,255,255,0.02);}
.td-rk{font-family:'Cormorant Garamond',serif;font-size:0.95rem;color:var(--tc);width:22px;}
.td-nm{color:var(--cream);}
.td-av{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--tc-light);text-align:center;width:46px;}
.td-sc{font-size:0.63rem;color:var(--muted);text-align:center;width:62px;}
.td-ga{font-size:0.7rem;color:var(--muted);text-align:center;width:70px;}
.td-lk a{color:var(--tc-light);font-size:0.63rem;text-decoration:none;}
.td-lk a:hover{color:var(--cream);}
.restart{margin-top:20px;display:block;width:fit-content;background:transparent;border:1px solid var(--tc);color:var(--tc-light);padding:7px 18px;font-family:'Nunito',sans-serif;font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;border-radius:2px;}
.restart:hover{background:var(--tc-dim);color:var(--cream);}
@media(max-width:620px){
  .card-body{flex-direction:column;}
  .panel-left{width:100%;flex:none;}
  .panel-right{flex:none;width:100%;}
  .gallery{width:100%;}
  .rating-area{padding:10px;}
  .gal-main{height:260px;}
  .star-wrap{width:2rem;height:2rem;}
  .links-bar{display:flex;flex-wrap:nowrap;width:100%;gap:0;}
  .link-slot.left{flex:1;align-items:flex-start;text-align:left;padding-right:4px;}
  .link-slot.center{flex:1;align-items:center;text-align:center;padding:0 4px;}
  .link-slot.right{flex:1;align-items:flex-end;text-align:right;padding-left:4px;}
  .link-empty{flex:1;}
  .link-slot a{font-size:0.68rem;}
  .link-info{font-size:0.56rem;}
  .bnav-inner{flex-direction:column;gap:7px;align-items:stretch;}
  .bnav-info{white-space:normal;}
  .tab-btn{padding:9px 12px;font-size:0.65rem;}
}

/* ─── RESULT SCORES ROW ─── */
.res-scores-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.res-rater{text-align:center;flex:1;}
.res-rater-name{display:block;font-size:0.58rem;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:2px;}
.res-rater-score{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--text);font-weight:500;line-height:1;}
.res-avg-center{text-align:center;flex:1;}

/* ─── GUEST CHIPS ─── */
.guest-chips-label{font-size:0.58rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin:8px 0 4px;text-align:center;}
.guest-chips{display:flex;flex-direction:column;gap:4px;}
.guest-chip{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:2px;padding:4px 8px;display:flex;flex-wrap:wrap;align-items:baseline;gap:6px;}
.gc-name{font-size:0.68rem;color:var(--tc-light);font-weight:600;letter-spacing:0.04em;}
.gc-score{font-size:0.68rem;color:var(--text);}
.gc-note{font-size:0.62rem;color:var(--muted);font-style:italic;width:100%;}

/* ─── RESULT COMMENTS ─── */
.result-comments{margin:6px 0;padding:5px 8px;background:rgba(255,255,255,0.03);border-left:2px solid var(--tc-dim);border-radius:0 2px 2px 0;}
.rc-item{font-size:0.63rem;color:var(--muted);font-style:italic;line-height:1.4;margin-bottom:2px;}
.rc-item:last-child{margin-bottom:0;}
.rc-who{color:var(--tc-light);font-style:normal;font-weight:600;margin-right:3px;}

/* ─── GUEST EXPAND IN TABLE ─── */
.guest-expand-btn{background:var(--tc-dim);border:1px solid rgba(184,88,48,0.3);color:var(--tc-light);padding:2px 7px;font-size:0.62rem;border-radius:2px;cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap;}

<script>
var VERSION = '4.0';
var SUPA_URL = 'https://iqelgfyryuqnshkqqkod.supabase.co';
var SUPA_KEY = 'sb_publishable_ko0ExD_VzJC3a_aN5XiQBg_FjajDrGN';

function supaFetch(path, method, body) {
  return fetch(SUPA_URL + '/rest/v1/' + path, {
    method: method || 'GET',
    headers: {
      'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'resolution=merge-duplicates' : ''
    },
    body: body ? JSON.stringify(body) : undefined
  }).then(function(r) {
    if (r.status === 204) return [];
    return r.json().then(function(d) {
      if (!r.ok) throw d;
      return d;
    });
  });
}

function setStatus(msg, cls) {
  var el = document.getElementById('sync-status'); if (!el) return;
  el.textContent = msg; el.className = 'sync-status ' + (cls || '');
  if (cls === 'saved') setTimeout(function() { if (el.textContent === msg) { el.textContent = ''; el.className = 'sync-status'; } }, 2500);
}

// ─── TAB ──────────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(function(el) { el.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(el) { el.classList.remove('active'); });
  var tc = document.getElementById('tab-' + name); if (tc) tc.classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(function(b) {
    if (b.textContent.trim().toLowerCase() === name) b.classList.add('active');
  });
}

// ─── STATE ────────────────────────────────────────────────────────────────────
var LAMPS = [];
var scores = {};
var guestScores = {};
var extraImages = {};
var currentIdx = 0;
var showingSummary = false;
var guestPendingScore = {}; // lampId -> pending star value for guest

function total() { return LAMPS.length; }

// ─── LOAD ─────────────────────────────────────────────────────────────────────
function init() {
  setStatus('Loading...', 'loading');
  Promise.all([
    supaFetch('lamps?order=sort_order'),
    supaFetch('lamp_scores?select=lamp_id,brad_score,wes_score,guest_scores')
  ]).then(function(results) {
    var lampRows   = results[0];
    var scoreRows  = results[1];

    // Map lamp rows to our LAMPS format
    LAMPS = (Array.isArray(lampRows) ? lampRows : []).map(function(r) {
      var links = [];
      if (r.link1_store && r.link1_url) links.push({store:r.link1_store, url:r.link1_url, info:r.link1_info||''});
      if (r.link2_store && r.link2_url) links.push({store:r.link2_store, url:r.link2_url, info:r.link2_info||''});
      if (r.link3_store && r.link3_url) links.push({store:r.link3_store, url:r.link3_url, info:r.link3_info||''});
      return {
        sec: r.sec, id: r.id, name: r.name, brand: r.brand||'',
        height: r.height||'', note: r.note||'', imgNote: r.img_note||'',
        img: r.img||'', links: links
      };
    });

    // Map score rows
    (Array.isArray(scoreRows) ? scoreRows : []).forEach(function(row) {
      if (!row.lamp_id) return;
      if (row.brad_score || row.wes_score) {
        scores[row.lamp_id] = { Brad: row.brad_score||0, Wes: row.wes_score||0 };
      }
      if (row.guest_scores) {
        try { guestScores[row.lamp_id] = JSON.parse(row.guest_scores); } catch(e) {}
      }
    });

    buildAll();

    // Restore star UI
    Object.keys(scores).forEach(function(id) {
      var s = scores[id];
      if (s.Brad) { renderStars(id,'Brad',s.Brad); setScoreDisp(id,'Brad',s.Brad); }
      if (s.Wes)  { renderStars(id,'Wes', s.Wes);  setScoreDisp(id,'Wes', s.Wes); }
      if (s.Brad && s.Wes) {
        showResult(id);
        var card = document.getElementById('card-'+id); if (card) card.classList.add('done');
      }
    });

    updateProgress(); updateBottomNav();
    setStatus('', '');
  }).catch(function(e) {
    console.error('Init error', e);
    document.getElementById('view-lamps').innerHTML = '<div class="loading-state" style="color:rgba(220,80,80,0.8)">Failed to load lamps. Check Supabase connection.</div>';
    setStatus('Load failed', 'error');
  });
}

function saveScore(id) {
  var s = scores[id] || {};
  var gs = guestScores[id] || [];
  setStatus('Saving...', 'saving');
  supaFetch('lamp_scores', 'POST', {
    lamp_id: id, brad_score: s.Brad||null, wes_score: s.Wes||null,
    guest_scores: JSON.stringify(gs), updated_at: new Date().toISOString()
  }).then(function() { setStatus('Saved', 'saved'); })
    .catch(function() { setStatus('Save failed', 'error'); });
}

// Save new lamp to Supabase
function saveLampToDb(lamp, sortOrder) {
  return supaFetch('lamps', 'POST', {
    id: lamp.id, sec: lamp.sec, name: lamp.name, brand: lamp.brand||null,
    height: lamp.height||null, note: lamp.note||null, img_note: lamp.imgNote||null,
    img: lamp.img||null,
    link1_store: lamp.links[0]?lamp.links[0].store:null, link1_url: lamp.links[0]?lamp.links[0].url:null, link1_info: lamp.links[0]?lamp.links[0].info:null,
    link2_store: lamp.links[1]?lamp.links[1].store:null, link2_url: lamp.links[1]?lamp.links[1].url:null, link2_info: lamp.links[1]?lamp.links[1].info:null,
    link3_store: lamp.links[2]?lamp.links[2].store:null, link3_url: lamp.links[2]?lamp.links[2].url:null, link3_info: lamp.links[2]?lamp.links[2].info:null,
    sort_order: sortOrder
  });
}

// ─── BUILD DOM ────────────────────────────────────────────────────────────────
function buildAll() {
  var view = document.getElementById('view-lamps'); if (!view) return;
  view.innerHTML = '';
  var prevSec = null;
  LAMPS.forEach(function(lamp, i) {
    if (lamp.sec !== prevSec) { prevSec = lamp.sec; view.appendChild(buildSecDiv(lamp.sec)); }
    view.appendChild(buildCard(lamp, i));
  });
}

function buildSecDiv(sec) {
  var d = document.createElement('div'); d.className = 'sec-div'; d.id = 'sec-'+sec;
  var cnt = LAMPS.filter(function(l){ return l.sec===sec; }).length;
  d.innerHTML = '<h2>'+(sec==='bedside'?'Bedside Lamps':'Accent Lamps')+'</h2>' +
    '<div class="sec-line"><span class="ln"></span><span class="sc" id="cnt-'+sec+'">'+cnt+' lamps</span><span class="ln"></span></div>' +
    '<br><button class="add-lamp-btn" onclick="toggleAddForm(\''+sec+'\')">+ Add Lamp</button>';
  var form = document.createElement('div'); form.className='add-lamp-form'; form.id='add-form-'+sec;
  form.innerHTML = '<h3>Add a New '+(sec==='bedside'?'Bedside':'Accent')+' Lamp</h3>' +
    '<div class="form-grid">' +
      '<div><label>Lamp Name *</label><input type="text" id="af-name-'+sec+'" placeholder="e.g. West Elm Ribbed Amber Glass Lamp"></div>' +
      '<div><label>Height</label><input type="text" id="af-ht-'+sec+'" placeholder="e.g. 24&quot;H — include units"></div>' +
      '<div><label>Brand / Maker</label><input type="text" id="af-brand-'+sec+'" placeholder="e.g. West Elm, Etsy shop name"></div>' +
      '<div><label>Image URL * <small class="form-req">Required</small></label><input type="text" id="af-img-'+sec+'" placeholder="Right-click image → Copy image address" required></div>' +
      '<div class="full"><label>Notes <small class="form-hint">Color, material, features, caveats</small></label><textarea id="af-note-'+sec+'" placeholder="e.g. Confirm terracotta colorway — multiple finishes available"></textarea></div>' +
    '</div>' +
    '<div class="link-inputs"><label>Purchase Links <small class="form-hint">Store · direct product URL · brief note</small></label>' +
      '<div class="link-row"><span class="lbl">Left</span><input id="af-ls-'+sec+'" placeholder="Store name e.g. Amazon"><input id="af-lu-'+sec+'" placeholder="https://... (product page URL)"><input id="af-li-'+sec+'" placeholder="e.g. Prime eligible"></div>' +
      '<div class="link-row"><span class="lbl">Center</span><input id="af-cs-'+sec+'" placeholder="Store name"><input id="af-cu-'+sec+'" placeholder="https://..."><input id="af-ci-'+sec+'" placeholder="e.g. Free ship on $65+"></div>' +
      '<div class="link-row"><span class="lbl">Right</span><input id="af-rs-'+sec+'" placeholder="Store or Similar lamps"><input id="af-ru-'+sec+'" placeholder="https://..."><input id="af-ri-'+sec+'" placeholder="e.g. Dupe or compare price"></div>' +
    '</div>' +
    '<div class="form-btns"><button class="form-submit" onclick="submitAddForm(\''+sec+'\')">Add Lamp</button><button class="form-cancel" onclick="toggleAddForm(\''+sec+'\')">Cancel</button></div>';
  d.appendChild(form); return d;
}

function toggleAddForm(sec) {
  var f = document.getElementById('add-form-'+sec); if (f) f.style.display = f.style.display==='block'?'none':'block';
}

function submitAddForm(sec) {
  var g = function(id){ var el=document.getElementById(id); return el?el.value.trim():''; };
  var name = g('af-name-'+sec); if (!name) { alert('Please enter a lamp name.'); return; }
  var imgUrl = g('af-img-'+sec); if (!imgUrl) { alert('Please enter an image URL. Right-click the product image and select "Copy image address".'); return; }
  var nums = LAMPS.filter(function(l){return l.sec===sec;}).map(function(l){return parseInt(l.id.replace(/\D/g,''))||0;});
  var newId = (sec==='bedside'?'B':'A')+(Math.max.apply(null,nums.concat([0]))+1);
  var links=[];
  [['ls','lu','li'],['cs','cu','ci'],['rs','ru','ri']].forEach(function(k){
    var s=g('af-'+k[0]+'-'+sec),u=g('af-'+k[1]+'-'+sec),i=g('af-'+k[2]+'-'+sec);
    if(s&&u) links.push({store:s,url:u,info:i});
  });
  var lamp={sec:sec,id:newId,name:name,brand:g('af-brand-'+sec),height:g('af-ht-'+sec),note:g('af-note-'+sec),imgNote:'',img:g('af-img-'+sec),links:links};
  var sortOrder = LAMPS.length + 1;
  LAMPS.push(lamp);
  setStatus('Saving new lamp...','saving');
  saveLampToDb(lamp, sortOrder).then(function(){ setStatus('Lamp saved','saved'); }).catch(function(){ setStatus('Save failed','error'); });
  var view=document.getElementById('view-lamps');
  var lastCard=null;
  LAMPS.forEach(function(l){if(l.sec===sec&&l.id!==newId){var el=document.getElementById('card-'+l.id);if(el)lastCard=el;}});
  var nc=buildCard(lamp,LAMPS.length-1);
  if(lastCard&&lastCard.nextSibling) view.insertBefore(nc,lastCard.nextSibling); else view.appendChild(nc);
  var cntEl=document.getElementById('cnt-'+sec); if(cntEl) cntEl.textContent=LAMPS.filter(function(l){return l.sec===sec;}).length+' lamps';
  toggleAddForm(sec); updateProgress(); updateBottomNav();
  nc.scrollIntoView({behavior:'smooth',block:'start'});
}

function buildCard(lamp) {
  var card=document.createElement('div'); card.className='lamp-card'; card.id='card-'+lamp.id;
  var title=document.createElement('div'); title.className='lamp-title';
  title.innerHTML='<span class="lamp-num">'+esc(lamp.id)+'</span><span class="lamp-name">'+esc(lamp.name)+'</span>'+(lamp.height?'<span class="lamp-ht">'+esc(lamp.height)+'</span>':'');
  card.appendChild(title);
  if(lamp.note){var nn=document.createElement('div');nn.className='lamp-note';nn.textContent=lamp.note;card.appendChild(nn);}
  var body=document.createElement('div'); body.className='card-body';

  // LEFT: image + links
  var left=document.createElement('div'); left.className='panel-left';
  var gallery=document.createElement('div'); gallery.className='gallery';
  var main=document.createElement('div'); main.className='gal-main'; main.id='gm-'+lamp.id;
  if(lamp.img){
    var pi=document.createElement('img'); pi.src=lamp.img; pi.alt=lamp.name;
    pi.onerror=function(){main.innerHTML='<div class="gal-ph"><span class="ico">\u26A0</span><span>Image failed</span></div>';};
    main.appendChild(pi);
    if(!extraImages[lamp.id]) extraImages[lamp.id]=[lamp.img];
  } else {
    main.innerHTML='<div class="gal-ph"><span class="ico">\uD83D\uDDBC\uFE0F</span><span>Upload images below</span></div>';
    if(!extraImages[lamp.id]) extraImages[lamp.id]=[];
  }
  gallery.appendChild(main);
  if(lamp.imgNote){var in2=document.createElement('div');in2.className='img-note';in2.textContent='\u26A0 '+lamp.imgNote;gallery.appendChild(in2);}

  var togBtn=document.createElement('button'); togBtn.className='photo-toggle'; togBtn.type='button';
  togBtn.innerHTML='<span class="caret">&#9658;</span> Photos & Upload';
  var photoPanel=document.createElement('div'); photoPanel.className='photo-panel'; photoPanel.id='pp-'+lamp.id;
  togBtn.addEventListener('click',function(){togBtn.classList.toggle('open');photoPanel.classList.toggle('open');});
  gallery.appendChild(togBtn);

  var strip=document.createElement('div'); strip.className='thumb-strip'; strip.id='strip-'+lamp.id;
  if(lamp.img){
    var th0=document.createElement('div'); th0.className='thumb active'; th0.setAttribute('data-ti',0);
    var ti0=document.createElement('img'); ti0.src=lamp.img; th0.appendChild(ti0);
    th0.addEventListener('click',makeThumbClick(lamp.id,lamp.img,0)); strip.appendChild(th0);
  }
  photoPanel.appendChild(strip);

  var ctrl=document.createElement('div'); ctrl.className='img-controls';
  var fileId='file-'+lamp.id;
  ctrl.innerHTML='<label class="upload-btn" for="'+fileId+'">\u2191 Upload</label><input type="file" id="'+fileId+'" accept="image/*" multiple><input type="text" id="url-'+lamp.id+'" placeholder="Paste image URL\u2026"><button onclick="applyUrl(\''+lamp.id+'\')">Add</button>';
  photoPanel.appendChild(ctrl);
  gallery.appendChild(photoPanel);
  setTimeout(function(){var fi=document.getElementById(fileId);if(fi)fi.addEventListener('change',function(e){handleUpload(lamp.id,e.target.files);});},0);

  left.appendChild(gallery);
  left.appendChild(buildLinksBar(lamp.links));
  body.appendChild(left);

  // RIGHT: ratings
  var right=document.createElement('div'); right.className='panel-right';
  var ra=document.createElement('div'); ra.className='rating-area'; ra.id='ra-'+lamp.id;

  ['Brad','Wes'].forEach(function(name,ni){
    if(ni>0){var dv=document.createElement('div');dv.className='rater-divider';ra.appendChild(dv);}
    var block=document.createElement('div'); block.className='rater-block';
    block.innerHTML='<div class="rater-name">'+name+'</div>';
    var rRight=document.createElement('div'); rRight.className='rater-right';
    var starsDiv=document.createElement('div'); starsDiv.className='stars'; starsDiv.id='stars-'+lamp.id+'-'+name;
    for(var s=1;s<=5;s++) starsDiv.appendChild(buildStarWrap(lamp.id,name,s));
    rRight.appendChild(starsDiv);
    var disp=document.createElement('div'); disp.className='score-disp'; disp.id='sd-'+lamp.id+'-'+name; rRight.appendChild(disp);
    var resetBtn=document.createElement('button'); resetBtn.className='rating-ctrl-btn'; resetBtn.textContent='Reset';
    resetBtn.addEventListener('click',makeReset(lamp.id,name)); rRight.appendChild(resetBtn);
    block.appendChild(rRight);
    ra.appendChild(block);
  });

  var rdiv=document.createElement('div'); rdiv.className='rater-divider'; ra.appendChild(rdiv);
  var rb=document.createElement('div'); rb.className='result-block'; rb.id='rb-'+lamp.id; ra.appendChild(rb);

  // Guest rating with stars
  var guestSec=document.createElement('div'); guestSec.className='guest-section';
  guestSec.innerHTML='<div class="guest-label">Guest Rating</div>' +
    '<div class="guest-name-row"><input type="text" id="gname-'+lamp.id+'" placeholder="Guest name" maxlength="20"></div>' +
    '<div class="guest-stars-row" id="gstars-'+lamp.id+'"></div>' +
    '<div class="score-disp" id="gsd-'+lamp.id+'" style="text-align:center;margin-bottom:5px;"></div>' +
    '<button class="guest-submit" onclick="submitGuest(\''+lamp.id+'\')">Add Guest Rating</button>';
  ra.appendChild(guestSec);

  // Build guest stars (5 full stars, no half for simplicity)
  setTimeout(function(){
    var gStarsDiv=document.getElementById('gstars-'+lamp.id);
    if(!gStarsDiv||gStarsDiv.children.length>0)return;
    for(var s=1;s<=5;s++){
      gStarsDiv.appendChild(buildGuestStarWrap(lamp.id,s));
    }
  },0);

  right.appendChild(ra); body.appendChild(right); card.appendChild(body);
  return card;
}

function buildLinksBar(links){
  var bar=document.createElement('div'); bar.className='links-bar';
  ['left','center','right'].forEach(function(pos,i){
    var slot=document.createElement('div'); var lnk=links&&links[i];
    if(lnk){
      slot.className='link-slot '+pos;
      slot.innerHTML='<a href="'+lnk.url+'" target="_blank" rel="noopener">'+esc(lnk.store)+' \u2197</a>'+(lnk.info?'<span class="link-info">'+esc(lnk.info)+'</span>':'');
    } else { slot.className='link-empty'; }
    bar.appendChild(slot);
  }); return bar;
}

// ─── HALF-STAR SVG (Brad/Wes) ─────────────────────────────────────────────────
var PTS = '12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26';

function buildStarWrap(id,name,starNum){
  var wrap=document.createElement('div'); wrap.className='star-wrap';
  var uid=id+'-'+name+'-'+starNum;
  wrap.innerHTML='<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">'+
    '<defs><clipPath id="cl-'+uid+'"><rect x="0" y="0" width="12" height="24"/></clipPath>'+
    '<clipPath id="cr-'+uid+'"><rect x="12" y="0" width="12" height="24"/></clipPath></defs>'+
    '<polygon class="star-poly" id="sbg-'+uid+'" fill="var(--star-off)" points="'+PTS+'"/>'+
    '<polygon class="star-poly" id="sl-'+uid+'" fill="var(--star-off)" clip-path="url(#cl-'+uid+')" points="'+PTS+'"/>'+
    '<polygon class="star-poly" id="sr-'+uid+'" fill="var(--star-off)" clip-path="url(#cr-'+uid+')" points="'+PTS+'"/>'+
    '</svg><div class="star-left-hit"></div><div class="star-right-hit"></div>';
  var lh=wrap.querySelector('.star-left-hit'), rh=wrap.querySelector('.star-right-hit');
  var hv=starNum-0.5, fv=starNum;
  lh.addEventListener('mouseenter',makeHovIn(id,name,hv)); lh.addEventListener('mouseleave',makeHovOut(id,name)); lh.addEventListener('click',makeClick(id,name,hv));
  rh.addEventListener('mouseenter',makeHovIn(id,name,fv)); rh.addEventListener('mouseleave',makeHovOut(id,name)); rh.addEventListener('click',makeClick(id,name,fv));
  return wrap;
}

// Guest stars (half-star too, same system)
function buildGuestStarWrap(id, starNum){
  var wrap=document.createElement('div'); wrap.className='star-wrap';
  var uid='g-'+id+'-'+starNum;
  wrap.innerHTML='<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">'+
    '<defs><clipPath id="cl-'+uid+'"><rect x="0" y="0" width="12" height="24"/></clipPath>'+
    '<clipPath id="cr-'+uid+'"><rect x="12" y="0" width="12" height="24"/></clipPath></defs>'+
    '<polygon class="star-poly" id="sbg-'+uid+'" fill="var(--star-off)" points="'+PTS+'"/>'+
    '<polygon class="star-poly" id="sl-'+uid+'" fill="var(--star-off)" clip-path="url(#cl-'+uid+')" points="'+PTS+'"/>'+
    '<polygon class="star-poly" id="sr-'+uid+'" fill="var(--star-off)" clip-path="url(#cr-'+uid+')" points="'+PTS+'"/>'+
    '</svg><div class="star-left-hit"></div><div class="star-right-hit"></div>';
  var lh=wrap.querySelector('.star-left-hit'), rh=wrap.querySelector('.star-right-hit');
  var hv=starNum-0.5, fv=starNum;
  lh.addEventListener('mouseenter',function(){renderGuestStars(id,hv);});
  lh.addEventListener('mouseleave',function(){renderGuestStars(id,guestPendingScore[id]||0);});
  lh.addEventListener('click',function(){guestPendingScore[id]=hv;renderGuestStars(id,hv);setGuestDisp(id,hv);});
  rh.addEventListener('mouseenter',function(){renderGuestStars(id,fv);});
  rh.addEventListener('mouseleave',function(){renderGuestStars(id,guestPendingScore[id]||0);});
  rh.addEventListener('click',function(){guestPendingScore[id]=fv;renderGuestStars(id,fv);setGuestDisp(id,fv);});
  return wrap;
}

function renderGuestStars(id,val){
  val=val||0;
  for(var s=1;s<=5;s++){
    var uid='g-'+id+'-'+s;
    var lEl=document.getElementById('sl-'+uid), rEl=document.getElementById('sr-'+uid);
    if(!lEl||!rEl) continue;
    var filled=val>=s, half=!filled&&val>=(s-0.5);
    lEl.style.fill=(filled||half)?'var(--star-on)':'var(--star-off)';
    rEl.style.fill=filled?'var(--star-on)':'var(--star-off)';
  }
}

function setGuestDisp(id,val){
  var el=document.getElementById('gsd-'+id); if(!el) return;
  if(!val){el.textContent='';return;}
  var full=Math.floor(val), isHalf=(val%1!==0);
  el.textContent='\u2605'.repeat(full)+(isHalf?'\u00BD':'')+' '+val+'/5';
}

function renderStars(id,name,val){
  val=val||0;
  for(var s=1;s<=5;s++){
    var uid=id+'-'+name+'-'+s;
    var lEl=document.getElementById('sl-'+uid), rEl=document.getElementById('sr-'+uid);
    if(!lEl||!rEl) continue;
    var filled=val>=s, half=!filled&&val>=(s-0.5);
    lEl.style.fill=(filled||half)?'var(--star-on)':'var(--star-off)';
    rEl.style.fill=filled?'var(--star-on)':'var(--star-off)';
  }
}

function setScoreDisp(id,name,val){
  var el=document.getElementById('sd-'+id+'-'+name); if(!el) return;
  if(!val){el.textContent='';return;}
  var full=Math.floor(val), isHalf=(val%1!==0);
  el.textContent='\u2605'.repeat(full)+(isHalf?'\u00BD':'')+' '+val+'/5';
}

function makeHovIn(id,name,val){return function(){if(scores[id]&&scores[id][name])return;renderStars(id,name,val);};}
function makeHovOut(id,name){return function(){renderStars(id,name,(scores[id]&&scores[id][name])||0);};}
function makeClick(id,name,val){
  return function(){
    if(!scores[id]) scores[id]={};
    scores[id][name]=val;
    renderStars(id,name,val); setScoreDisp(id,name,val);
    checkBothRated(id);
  };
}
function makeReset(id,name){
  return function(){
    if(!scores[id]) scores[id]={};
    scores[id][name]=0;
    renderStars(id,name,0); setScoreDisp(id,name,0);
    var rb=document.getElementById('rb-'+id); if(rb) rb.style.display='none';
    var card=document.getElementById('card-'+id); if(card) card.classList.remove('done');
    saveScore(id); updateProgress(); updateBottomNav();
  };
}

function checkBothRated(id){
  var s=scores[id]; if(!s||!s.Brad||!s.Wes) return;
  showResult(id);
  var card=document.getElementById('card-'+id); if(card) card.classList.add('done');
  saveScore(id); updateProgress(); updateBottomNav();
}

function showResult(id){
  var s=scores[id]; if(!s||!s.Brad||!s.Wes) return;
  var avg=((s.Brad+s.Wes)/2);
  var avgStr=avg%1===0?avg.toFixed(1):avg.toFixed(2).replace(/0+$/,'');
  var gs=guestScores[id]||[];
  var gAvgStr='';
  if(gs.length>0){
    var gSum=gs.reduce(function(a,b){return a+b.score;},0);
    gAvgStr='<div class="res-guest">Guest avg: '+(gSum/gs.length).toFixed(1)+' ('+gs.length+')</div>';
  }
  var rb=document.getElementById('rb-'+id);
  if(rb){
    rb.style.display='block';
    rb.innerHTML='<div class="res-label">Scores</div><div class="res-scores">Brad: '+s.Brad+' &middot; Wes: '+s.Wes+'</div><div class="res-avg">'+avgStr+'</div><div class="res-avg-label">avg</div>'+gAvgStr;
  }
}

// ─── GUEST SUBMIT ─────────────────────────────────────────────────────────────
function submitGuest(id){
  var nameEl=document.getElementById('gname-'+id);
  var gname=(nameEl&&nameEl.value.trim())||'';
  var gscore=guestPendingScore[id]||0;
  if(!gname){alert('Please enter a guest name.');return;}
  if(!gscore){alert('Please select a star rating.');return;}
  if(!guestScores[id]) guestScores[id]=[];
  guestScores[id].push({name:gname,score:gscore});
  nameEl.value='';
  guestPendingScore[id]=0;
  renderGuestStars(id,0);
  setGuestDisp(id,0);
  if(scores[id]&&scores[id].Brad&&scores[id].Wes) showResult(id);
  saveScore(id);
}

// ─── IMAGE ────────────────────────────────────────────────────────────────────
function makeThumbClick(id,src,idx){
  return function(){
    setMainImg(id,src);
    var strip=document.getElementById('strip-'+id);
    if(strip) strip.querySelectorAll('.thumb').forEach(function(t){t.classList.toggle('active',+t.getAttribute('data-ti')===idx);});
  };
}
function setMainImg(id,src){
  var main=document.getElementById('gm-'+id); if(!main) return;
  main.innerHTML=''; var img=document.createElement('img'); img.src=src; img.alt='Lamp';
  img.onerror=function(){main.innerHTML='<div class="gal-ph"><span class="ico">\u26A0</span><span>Image failed to load</span></div>';};
  main.appendChild(img);
}
function handleUpload(id,files){
  if(!files||!files.length) return;
  Array.from(files).forEach(function(file){var r=new FileReader();r.onload=function(e){addImageSrc(id,e.target.result);};r.readAsDataURL(file);});
}
function applyUrl(id){
  var input=document.getElementById('url-'+id); var url=(input.value||'').trim(); if(!url) return;
  addImageSrc(id,url); input.value='';
}
function addImageSrc(id,src){
  if(!extraImages[id]) extraImages[id]=[];
  var idx=extraImages[id].length; extraImages[id].push(src);
  var strip=document.getElementById('strip-'+id); if(!strip) return;
  var th=document.createElement('div'); th.className='thumb'; th.setAttribute('data-ti',idx);
  var img=document.createElement('img'); img.src=src; th.appendChild(img);
  th.addEventListener('click',makeThumbClick(id,src,idx));
  strip.appendChild(th); setMainImg(id,src);
  strip.querySelectorAll('.thumb').forEach(function(t){t.classList.toggle('active',+t.getAttribute('data-ti')===idx);});
  var pp=document.getElementById('pp-'+id), tog=pp&&pp.previousElementSibling;
  if(pp&&!pp.classList.contains('open')){pp.classList.add('open');if(tog)tog.classList.add('open');}
}

// ─── NAV ──────────────────────────────────────────────────────────────────────
function navTo(idx){
  if(idx<0||idx>=LAMPS.length) return;
  currentIdx=idx;
  var card=document.getElementById('card-'+LAMPS[idx].id);
  if(card) card.scrollIntoView({behavior:'smooth',block:'start'});
  updateBottomNav();
}
function navNext(){ if(currentIdx<LAMPS.length-1) navTo(currentIdx+1); else showSummary(); }
window.addEventListener('scroll',function(){
  if(showingSummary) return;
  var best=0;
  for(var i=0;i<LAMPS.length;i++){var el=document.getElementById('card-'+LAMPS[i].id);if(el&&el.getBoundingClientRect().top<=100)best=i;}
  if(best!==currentIdx){currentIdx=best;updateBottomNav();}
},{passive:true});

function updateBottomNav(){
  var lamp=LAMPS[currentIdx]; var nm=lamp?lamp.id+': '+lamp.name:'';
  if(nm.length>55) nm=nm.substring(0,55)+'\u2026';
  var infoEl=document.getElementById('bnav-info'); if(infoEl) infoEl.textContent='Lamp '+(currentIdx+1)+' of '+total()+' \u2014 '+nm;
  var bb=document.getElementById('btn-back'); if(bb) bb.disabled=currentIdx===0;
  var rated=Object.keys(scores).filter(function(k){return scores[k].Brad&&scores[k].Wes;}).length;
  var sb=document.getElementById('btn-summary'); if(sb) sb.style.display=rated>0?'inline-block':'none';
  var nb=document.getElementById('btn-next'); if(nb) nb.textContent=currentIdx===LAMPS.length-1?'See Results \u2192':'Next \u2192';
}

function updateProgress(){
  var rated=Object.keys(scores).filter(function(k){return scores[k].Brad&&scores[k].Wes;}).length;
  var tot=total(); var pct=tot>0?Math.round(rated/tot*100):0; var txt=rated+' of '+tot+' rated';
  ['pt','bnav-pt'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=txt;});
  ['pf','bnav-pf'].forEach(function(id){var el=document.getElementById(id);if(el)el.style.width=pct+'%';});
  ['pp','bnav-pp'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=pct+'%';});
}

// ─── SUMMARY ──────────────────────────────────────────────────────────────────
function showSummary(){
  showingSummary=true;
  var el=document.getElementById('summary-lamps'); if(!el) return;
  el.style.display='block'; el.scrollIntoView({behavior:'smooth',block:'start'});
  var unrated=LAMPS.filter(function(l){return !scores[l.id]||!scores[l.id].Brad||!scores[l.id].Wes;}).length;
  function ranked(sec){
    return LAMPS.filter(function(l){return l.sec===sec&&scores[l.id]&&scores[l.id].Brad&&scores[l.id].Wes;})
      .map(function(l){
        var s=scores[l.id]; var avg=(s.Brad+s.Wes)/2;
        var gs=guestScores[l.id]||[]; var gavg=gs.length>0?gs.reduce(function(a,b){return a+b.score;},0)/gs.length:null;
        return{l:l,avg:avg,b:s.Brad,w:s.Wes,gavg:gavg,gcnt:gs.length};
      }).sort(function(a,b){return b.avg-a.avg;});
  }
  function tbl(items){
    if(!items.length) return '<p style="color:var(--muted);font-size:0.74rem">No lamps rated yet.</p>';
    return '<table class="rtbl"><thead><tr><th>#</th><th>Lamp</th><th class="tc">Avg</th><th class="tc">B/W</th><th class="tc">Guest Avg</th><th>Link</th></tr></thead><tbody>'+
      items.map(function(it,i){
        var lk=it.l.links&&it.l.links[0]?'<a href="'+it.l.links[0].url+'" target="_blank" rel="noopener">'+esc(it.l.links[0].store)+' \u2197</a>':'\u2014';
        var avgStr=it.avg%1===0?it.avg.toFixed(1):it.avg.toFixed(2).replace(/0+$/,'');
        var gavgStr=it.gavg!==null?it.gavg.toFixed(1)+' <small style="color:var(--muted)">('+it.gcnt+')</small>':'<span style="color:var(--muted)">\u2014</span>';
        return '<tr><td class="td-rk">'+(i+1)+'</td><td class="td-nm">'+esc(it.l.id)+' &middot; '+esc(it.l.name)+(it.l.height?' <small style="color:var(--tc-light);font-size:0.6rem">('+esc(it.l.height)+')</small>':'')+'</td><td class="td-av">'+avgStr+'</td><td class="td-sc">'+it.b+'/'+it.w+'</td><td class="td-ga">'+gavgStr+'</td><td class="td-lk">'+lk+'</td></tr>';
      }).join('')+'</tbody></table>';
  }
  el.innerHTML='<div class="sum-hdr">Results</div><div class="sum-sub">'+(total()-unrated)+' of '+total()+' lamps rated &middot; sorted by Brad &amp; Wes average</div>'+
    '<div class="sum-sec">Bedside Lamps</div>'+tbl(ranked('bedside'))+'<div class="sum-sec">Accent Lamps</div>'+tbl(ranked('accent'))+
    (unrated>0?'<div class="sum-sec" style="margin-top:16px">Unrated ('+unrated+')</div><p style="font-size:0.68rem;color:var(--muted)">'+LAMPS.filter(function(l){return !scores[l.id]||!scores[l.id].Brad||!scores[l.id].Wes;}).map(function(l){return l.id;}).join(', ')+'</p>':'')+
    '<button class="restart" onclick="location.reload()">Start Over</button>';
  var bnInfo=document.getElementById('bnav-info'); if(bnInfo) bnInfo.textContent='Summary';
  var nb=document.getElementById('btn-next'); if(nb) nb.style.display='none';
  var bb=document.getElementById('btn-back'); if(bb) bb.style.display='none';
  var sb=document.getElementById('btn-summary'); if(sb){sb.textContent='\u2190 Back to Lamps';sb.onclick=backFromSummary;sb.style.display='inline-block';}
}
function backFromSummary(){
  showingSummary=false;
  var el=document.getElementById('summary-lamps'); if(el) el.style.display='none';
  var nb=document.getElementById('btn-next'); if(nb) nb.style.display='';
  var bb=document.getElementById('btn-back'); if(bb) bb.style.display='';
  var sb=document.getElementById('btn-summary'); if(sb){sb.textContent='Results';sb.onclick=showSummary;}
  navTo(currentIdx);
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ─── INIT ─────────────────────────────────────────────────────────────────────
init();
</script>

<script>

// ═══════════════════════════════════════════════════════════════════════════════
// GENERIC TAB ENGINE
// ═══════════════════════════════════════════════════════════════════════════════
var TAB_STATE = {
  rugs:     { items:[], scores:{}, guestScores:{}, extraImages:{}, guestPending:{}, guestComments:{}, comments:{}, idx:0 },
  dressers: { items:[], scores:{}, guestScores:{}, extraImages:{}, guestPending:{}, guestComments:{}, comments:{}, idx:0 },
  misc:     { items:[], scores:{}, guestScores:{}, extraImages:{}, guestPending:{}, guestComments:{}, comments:{}, idx:0 }
};
var TAB_CFG = {
  rugs:     { table:'rugs',     scoreTable:'rug_scores',     idPrefix:'R', label:'Rug',     specsLabel:'Specs' },
  dressers: { table:'dressers', scoreTable:'dresser_scores', idPrefix:'D', label:'Dresser', specsLabel:'Specs' },
  misc:     { table:'misc',     scoreTable:'misc_scores',    idPrefix:'M', label:'Item',    specsLabel:'Details' }
};

function initTab(tab) {
  var cfg=TAB_CFG[tab]; var st=TAB_STATE[tab];
  setTabStatus(tab,'Loading...','loading');
  Promise.all([
    supaFetch(cfg.table+'?order=sort_order'),
    supaFetch(cfg.scoreTable+'?select=item_id,brad_score,wes_score,guest_scores')
  ]).then(function(res) {
    var rows=res[0]; var scoreRows=res[1];
    st.items=(Array.isArray(rows)?rows:[]).map(function(r){
      var links=[];
      if(r.link1_store&&r.link1_url) links.push({store:r.link1_store,url:r.link1_url,info:r.link1_info||''});
      if(r.link2_store&&r.link2_url) links.push({store:r.link2_store,url:r.link2_url,info:r.link2_info||''});
      if(r.link3_store&&r.link3_url) links.push({store:r.link3_store,url:r.link3_url,info:r.link3_info||''});
      return {id:r.id,name:r.name,brand:r.brand||'',specs:r.specs||'',note:r.note||'',img:r.img||'',links:links};
    });
    (Array.isArray(scoreRows)?scoreRows:[]).forEach(function(row){
      if(!row.item_id) return;
      if(row.brad_score||row.wes_score) st.scores[row.item_id]={Brad:row.brad_score||0,Wes:row.wes_score||0};
      if(row.guest_scores){try{st.guestScores[row.item_id]=JSON.parse(row.guest_scores);}catch(e){}}
    });
    buildTabAll(tab);
    Object.keys(st.scores).forEach(function(id){
      var s=st.scores[id];
      if(s.Brad){renderTabStars(tab,id,'Brad',s.Brad);setTabScoreDisp(tab,id,'Brad',s.Brad);}
      if(s.Wes){renderTabStars(tab,id,'Wes',s.Wes);setTabScoreDisp(tab,id,'Wes',s.Wes);}
      if(s.Brad&&s.Wes){showTabResult(tab,id);var card=document.getElementById('tcard-'+tab+'-'+id);if(card)card.classList.add('done');}
    });
    updateTabProgress(tab); updateTabBottomNav(tab);
    setTabStatus(tab,'','');
  }).catch(function(e){
    console.error(tab+' load error',e);
    var v=document.getElementById('view-'+tab);
    if(v) v.innerHTML='<div class="loading-state" style="color:rgba(220,80,80,0.8)">Failed to load. Check Supabase.</div>';
    setTabStatus(tab,'Load failed','error');
  });
}

function saveTabScore(tab,id){
  var cfg=TAB_CFG[tab]; var st=TAB_STATE[tab];
  var s=st.scores[id]||{}; var gs=st.guestScores[id]||[];
  setTabStatus(tab,'Saving...','saving');
  supaFetch(cfg.scoreTable,'POST',{
    item_id:id,brad_score:s.Brad||null,wes_score:s.Wes||null,
    guest_scores:JSON.stringify(gs),updated_at:new Date().toISOString()
  }).then(function(){setTabStatus(tab,'Saved','saved');})
    .catch(function(){setTabStatus(tab,'Save failed','error');});
}

function saveTabItemToDb(tab,item,sortOrder){
  var cfg=TAB_CFG[tab];
  return supaFetch(cfg.table,'POST',{
    id:item.id,name:item.name,brand:item.brand||null,specs:item.specs||null,
    note:item.note||null,img:item.img||null,
    link1_store:item.links[0]?item.links[0].store:null,link1_url:item.links[0]?item.links[0].url:null,link1_info:item.links[0]?item.links[0].info:null,
    link2_store:item.links[1]?item.links[1].store:null,link2_url:item.links[1]?item.links[1].url:null,link2_info:item.links[1]?item.links[1].info:null,
    link3_store:item.links[2]?item.links[2].store:null,link3_url:item.links[2]?item.links[2].url:null,link3_info:item.links[2]?item.links[2].info:null,
    sort_order:sortOrder
  });
}

function setTabStatus(tab,msg,cls){
  var el=document.getElementById('sync-status-'+tab); if(!el) return;
  el.textContent=msg; el.className='sync-status '+(cls||'');
  if(cls==='saved') setTimeout(function(){if(el.textContent===msg){el.textContent='';el.className='sync-status';}},2500);
}

function buildTabAll(tab){
  var cfg=TAB_CFG[tab]; var st=TAB_STATE[tab];
  var view=document.getElementById('view-'+tab); if(!view) return;
  view.innerHTML='';
  var addDiv=document.createElement('div');
  addDiv.style.cssText='padding:14px 24px;background:var(--plum);border-bottom:2px solid var(--tc);text-align:center;';
  addDiv.innerHTML='<button class="add-lamp-btn" onclick="toggleTabAddForm(\''+tab+'\')">+ Add '+cfg.label+'</button>';
  addDiv.appendChild(buildTabAddForm(tab));
  view.appendChild(addDiv);
  st.items.forEach(function(item,i){view.appendChild(buildTabCard(tab,item,i));});
}

function buildTabAddForm(tab){

  if(gs.length>0){var gSum=gs.reduce(function(a,b){return a+b.score;},0);gAvgStr='<div class="res-guest">Guest avg: '+(gSum/gs.length).toFixed(1)+' ('+gs.length+')</div>';}

function submitTabGuest(tab,id){
  var st=TAB_STATE[tab];

  ['pf-'+tab,'bnav-pf-'+tab].forEach(function(id){var el=document.getElementById(id);if(el)el.style.width=pct+'%';});

function showTabSummary(tab){
  var st=TAB_STATE[tab];
  var el=document.getElementById('summary-'+tab); if(!el) return;
  el.style.display='block'; el.scrollIntoView({behavior:'smooth',block:'start'});
  var unrated=st.items.filter(function(it){return !st.scores[it.id]||!st.scores[it.id].Brad||!st.scores[it.id].Wes;}).length;
  var items=st.items.filter(function(it){return st.scores[it.id]&&st.scores[it.id].Brad&&st.scores[it.id].Wes;})
    .map(function(it){
      var s=st.scores[it.id]; var avg=(s.Brad+s.Wes)/2;
      var gs=st.guestScores[it.id]||[]; var gavg=gs.length>0?gs.reduce(function(a,b){return a+b.score;},0)/gs.length:null;
      return{it:it,avg:avg,b:s.Brad,w:s.Wes,gavg:gavg,gcnt:gs.length};
    }).sort(function(a,b){return b.avg-a.avg;});
  function tbl(rows){
    if(!rows.length) return '<p style="color:var(--muted);font-size:0.74rem">No items rated yet.</p>';

      rows.map(function(r,i){

  var bb=document.getElementById('btn-back-'+tab); if(bb) bb.style.display='none';
  var sb=document.getElementById('btn-summary-'+tab); if(sb){sb.textContent='\u2190 Back';sb.onclick=function(){backTabSummary(tab);};sb.style.display='inline-block';}
}

var _origSaveScore = saveScore;
saveScore = function(id) {
  var s = scores[id] || {};

window.lampComments = {};

// ─── PATCH loadScores to restore comments ─────────────────────────────────────
var _origInit = init;
init = function() {
  setStatus('Loading...', 'loading');
  Promise.all([
    supaFetch('lamps?order=sort_order'),
    supaFetch('lamp_scores?select=lamp_id,brad_score,wes_score,guest_scores,comments')
  ]).then(function(results) {
    var lampRows  = results[0];
    var scoreRows = results[1];
    LAMPS = (Array.isArray(lampRows) ? lampRows : []).map(function(r) {
      var links = [];
      if (r.link1_store && r.link1_url) links.push({store:r.link1_store, url:r.link1_url, info:r.link1_info||''});
      if (r.link2_store && r.link2_url) links.push({store:r.link2_store, url:r.link2_url, info:r.link2_info||''});
      if (r.link3_store && r.link3_url) links.push({store:r.link3_store, url:r.link3_url, info:r.link3_info||''});
      return { sec:r.sec, id:r.id, name:r.name, brand:r.brand||'', height:r.height||'', note:r.note||'', imgNote:r.img_note||'', img:r.img||'', links:links };
    });
    (Array.isArray(scoreRows) ? scoreRows : []).forEach(function(row) {
      if (!row.lamp_id) return;
      if (row.brad_score || row.wes_score) scores[row.lamp_id] = { Brad:row.brad_score||0, Wes:row.wes_score||0 };
      if (row.guest_scores) { try { guestScores[row.lamp_id] = JSON.parse(row.guest_scores); } catch(e){} }
      if (row.comments)     { try { window.lampComments[row.lamp_id] = JSON.parse(row.comments); } catch(e){} }
    });
    buildAll();
    Object.keys(scores).forEach(function(id) {
      var s = scores[id];
      if (s.Brad) { renderStars(id,'Brad',s.Brad); setScoreDisp(id,'Brad',s.Brad); }
      if (s.Wes)  { renderStars(id,'Wes', s.Wes);  setScoreDisp(id,'Wes', s.Wes); }
      if (s.Brad && s.Wes) { showResult(id); var card=document.getElementById('card-'+id); if(card) card.classList.add('done'); }
    });
    // Restore comment fields
    Object.keys(window.lampComments).forEach(function(id) {
      var cm = window.lampComments[id];
      ['Brad','Wes'].forEach(function(name) {
        var el = document.getElementById('comment-'+id+'-'+name);
        if (el && cm[name]) el.value = cm[name];
      });
    });
    updateProgress(); updateBottomNav();
    setStatus('', '');
  }).catch(function(e) {
    console.error('Init error', e);
    document.getElementById('view-lamps').innerHTML = '<div class="loading-state" style="color:rgba(220,80,80,0.8)">Failed to load lamps.</div>';
    setStatus('Load failed', 'error');
  });
};

// ─── PATCH buildCard to add: lightbox on image, comment fields, improved guest UI ──
var _origBuildCard = buildCard;
buildCard = function(lamp) {
  var card = _origBuildCard(lamp);

  // 1. Make main image clickable (zoom)
  var main = card.querySelector('.gal-main');
  if (main) {
    main.style.cursor = 'zoom-in';
    main.addEventListener('click', function() {
      var img = main.querySelector('img');
      if (img) openLightbox(img.src);
    });
  }

  // 2. Add comment fields under each rater's stars
  var ra = card.querySelector('.rating-area');
  if (ra) {
    ['Brad','Wes'].forEach(function(name) {
      var block = ra.querySelector('#stars-'+lamp.id+'-'+name);
      if (!block) return;
      // Find the rater-block parent
      var raterBlock = block.parentElement;
      if (!raterBlock) return;
      var rRight = raterBlock.querySelector ? raterBlock.querySelector('.rater-right') : null;
      var target = rRight || raterBlock;
      var ta = document.createElement('textarea');
      ta.id = 'comment-'+lamp.id+'-'+name;
      ta.placeholder = name+"'s note\u2026";
      ta.rows = 2;
      ta.style.cssText = 'width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--text);padding:4px 7px;font-size:0.64rem;border-radius:2px;font-family:Nunito,sans-serif;resize:vertical;line-height:1.4;margin-top:4px;';
      ta.addEventListener('input', function() {
        if (!window.lampComments[lamp.id]) window.lampComments[lamp.id] = {};
        window.lampComments[lamp.id][name] = ta.value;
        clearTimeout(ta._t);
        ta._t = setTimeout(function(){ saveScore(lamp.id); }, 1200);
      });
      target.appendChild(ta);
    });
  }

  return card;
};

// ─── PATCH showResult for lamps (better guest display) ────────────────────────
showResult = function(id) {
  var s = scores[id]; if (!s||!s.Brad||!s.Wes) return;
  var avg = (s.Brad+s.Wes)/2;
  var avgStr = avg%1===0 ? avg.toFixed(1) : avg.toFixed(2).replace(/0+$/,'');
  var gs = guestScores[id]||[];
  var cm = window.lampComments[id]||{};
  var rb = document.getElementById('rb-'+id); if (!rb) return;

  var guestHtml = '';
  if (gs.length > 0) {
    var gSum = gs.reduce(function(a,b){return a+b.score;},0);
    var gAvg = (gSum/gs.length).toFixed(1);
    guestHtml = '<div class="guest-chips-label">Guest ratings &mdash; avg ' + gAvg + '</div>' +
      '<div class="guest-chips">' +
      gs.map(function(g){
        var full=Math.floor(g.score), half=g.score%1!==0;
        var stars='\u2605'.repeat(full)+(half?'\u00BD':'');
        return '<div class="guest-chip"><span class="gc-name">'+esc(g.name)+'</span><span class="gc-score">'+stars+' '+g.score+'</span>'+(g.note?'<span class="gc-note">'+esc(g.note)+'</span>':'')+'</div>';
      }).join('') + '</div>';
  }

  var commentHtml = '';
  if (cm.Brad||cm.Wes) {
    commentHtml = '<div class="result-comments">';
    if (cm.Brad) commentHtml += '<div class="rc-item"><span class="rc-who">Brad:</span> '+esc(cm.Brad)+'</div>';
    if (cm.Wes)  commentHtml += '<div class="rc-item"><span class="rc-who">Wes:</span> '+esc(cm.Wes)+'</div>';
    commentHtml += '</div>';
  }

  rb.style.display = 'block';
  rb.innerHTML =
    '<div class="res-scores-row"><div class="res-rater"><span class="res-rater-name">Brad</span><span class="res-rater-score">'+s.Brad+'</span></div>' +
    '<div class="res-avg-center"><div class="res-avg">'+avgStr+'</div><div class="res-avg-label">avg</div></div>' +
    '<div class="res-rater"><span class="res-rater-name">Wes</span><span class="res-rater-score">'+s.Wes+'</span></div></div>' +
    commentHtml + guestHtml;
};

// ─── PATCH summary table for lamps ────────────────────────────────────────────
showSummary = function() {
  showingSummary = true;
  var el = document.getElementById('summary-lamps'); if (!el) return;
  el.style.display = 'block'; el.scrollIntoView({behavior:'smooth',block:'start'});
  var unrated = LAMPS.filter(function(l){return !scores[l.id]||!scores[l.id].Brad||!scores[l.id].Wes;}).length;

  function ranked(sec) {
    return LAMPS.filter(function(l){return l.sec===sec&&scores[l.id]&&scores[l.id].Brad&&scores[l.id].Wes;})
      .map(function(l){
        var s=scores[l.id]; var avg=(s.Brad+s.Wes)/2;
        var gs=guestScores[l.id]||[]; var gavg=gs.length>0?gs.reduce(function(a,b){return a+b.score;},0)/gs.length:null;
        var cm=window.lampComments[l.id]||{};
        return{l:l,avg:avg,b:s.Brad,w:s.Wes,gavg:gavg,gcnt:gs.length,gs:gs,cm:cm};
      }).sort(function(a,b){return b.avg-a.avg;});
  }

  function tbl(items) {
    if (!items.length) return '<p style="color:var(--muted);font-size:0.74rem">No lamps rated yet.</p>';
    return '<table class="rtbl"><thead><tr><th>#</th><th>Lamp</th><th class="tc">Avg</th><th class="tc">Brad</th><th class="tc">Wes</th><th class="tc">Guests</th><th>Buy</th></tr></thead><tbody>'+
      items.map(function(it,i){
        var lk = it.l.links&&it.l.links[0]?'<a href="'+it.l.links[0].url+'" target="_blank" rel="noopener">'+esc(it.l.links[0].store)+' \u2197</a>':'\u2014';
        var avgStr = it.avg%1===0?it.avg.toFixed(1):it.avg.toFixed(2).replace(/0+$/,'');
        var guestCell = it.gcnt===0 ? '<span style="color:var(--muted)">\u2014</span>' :
          '<button class="guest-expand-btn" onclick="toggleGuestExpand(this)" data-guests=\''+JSON.stringify(it.gs)+'\'>'+it.gcnt+' \u2193</button>';
        var commentRow = (it.cm.Brad||it.cm.Wes) ?
          '<tr class="comment-row"><td></td><td colspan="6" style="padding:2px 7px 8px;font-size:0.64rem;color:var(--muted);font-style:italic;">'+(it.cm.Brad?'<b style="color:var(--tc-light)">B:</b> '+esc(it.cm.Brad)+' ':'')+(it.cm.Wes?'<b style="color:var(--tc-light)">W:</b> '+esc(it.cm.Wes):'')+'</td></tr>' : '';
        return '<tr><td class="td-rk">'+(i+1)+'</td><td class="td-nm">'+esc(it.l.id)+' &middot; '+esc(it.l.name)+(it.l.height?' <small style="color:var(--tc-light);font-size:0.6rem">('+esc(it.l.height)+')</small>':'')+'</td><td class="td-av">'+avgStr+'</td><td class="td-sc">'+it.b+'</td><td class="td-sc">'+it.w+'</td><td class="td-sc">'+guestCell+'</td><td class="td-lk">'+lk+'</td></tr>'+commentRow;
      }).join('')+'</tbody></table>';
  }

  el.innerHTML='<div class="sum-hdr">Results</div><div class="sum-sub">'+(total()-unrated)+' of '+total()+' lamps rated &middot; sorted by Brad &amp; Wes average</div>'+
    '<div class="sum-sec">Bedside Lamps</div>'+tbl(ranked('bedside'))+
    '<div class="sum-sec">Accent Lamps</div>'+tbl(ranked('accent'))+
    (unrated>0?'<div class="sum-sec" style="margin-top:16px">Unrated ('+unrated+')</div><p style="font-size:0.68rem;color:var(--muted)">'+LAMPS.filter(function(l){return !scores[l.id]||!scores[l.id].Brad||!scores[l.id].Wes;}).map(function(l){return l.id;}).join(', ')+'</p>':'')+
    '<button class="restart" onclick="location.reload()">Start Over</button>';

  document.getElementById('bnav-info').textContent='Summary';
  document.getElementById('btn-next').style.display='none';
  document.getElementById('btn-back').style.display='none';
  var sb=document.getElementById('btn-summary'); if(sb){sb.textContent='\u2190 Back to Lamps';sb.onclick=backFromSummary;sb.style.display='inline-block';}
};

function toggleGuestExpand(btn) {
  var guests = JSON.parse(btn.getAttribute('data-guests'));
  var next = btn.nextElementSibling;
  if (next && next.classList.contains('guest-expand-panel')) {
    next.remove(); btn.textContent = guests.length+' \u2193';
  } else {
    var panel = document.createElement('div');
    panel.className = 'guest-expand-panel';
    panel.style.cssText = 'margin-top:6px;';
    panel.innerHTML = guests.map(function(g){
      var full=Math.floor(g.score),half=g.score%1!==0;
      var stars='\u2605'.repeat(full)+(half?'\u00BD':'');
      return '<div class="guest-chip"><span class="gc-name">'+esc(g.name)+'</span><span class="gc-score">'+stars+' '+g.score+'</span>'+(g.note?'<span class="gc-note">'+esc(g.note)+'</span>':'')+'</div>';
    }).join('');
    btn.parentNode.insertBefore(panel, btn.nextSibling);
    btn.textContent = guests.length+' \u2191';
  }
}

saveTabScore = function(tab, id) {

  var s=st.scores[id]||{}; var gs=st.guestScores[id]||[];

  supaFetch(cfg.scoreTable,'POST',{
    item_id:id, brad_score:s.Brad||null, wes_score:s.Wes||null,
    guest_scores:JSON.stringify(gs), comments:JSON.stringify(cm),
    updated_at:new Date().toISOString()
  }).then(function(){setTabStatus(tab,'Saved','saved');})
    .catch(function(){setTabStatus(tab,'Save failed','error');});

// ─── PATCH initTab to restore comments ────────────────────────────────────────
var _origInitTab = initTab;
initTab = function(tab) {
  var cfg=TAB_CFG[tab]; var st=TAB_STATE[tab];
  if (!st.comments) st.comments = {};
  setTabStatus(tab,'Loading...','loading');
  Promise.all([
    supaFetch(cfg.table+'?order=sort_order'),
    supaFetch(cfg.scoreTable+'?select=item_id,brad_score,wes_score,guest_scores,comments')
  ]).then(function(res) {
    var rows=res[0]; var scoreRows=res[1];
    st.items=(Array.isArray(rows)?rows:[]).map(function(r){
      var links=[];
      if(r.link1_store&&r.link1_url) links.push({store:r.link1_store,url:r.link1_url,info:r.link1_info||''});
      if(r.link2_store&&r.link2_url) links.push({store:r.link2_store,url:r.link2_url,info:r.link2_info||''});
      if(r.link3_store&&r.link3_url) links.push({store:r.link3_store,url:r.link3_url,info:r.link3_info||''});
      return{id:r.id,name:r.name,brand:r.brand||'',specs:r.specs||'',note:r.note||'',img:r.img||'',links:links};
    });
    (Array.isArray(scoreRows)?scoreRows:[]).forEach(function(row){
      if(!row.item_id) return;
      if(row.brad_score||row.wes_score) st.scores[row.item_id]={Brad:row.brad_score||0,Wes:row.wes_score||0};
      if(row.guest_scores){try{st.guestScores[row.item_id]=JSON.parse(row.guest_scores);}catch(e){}}
      if(row.comments){try{st.comments[row.item_id]=JSON.parse(row.comments);}catch(e){}}
    });
    buildTabAll(tab);
    Object.keys(st.scores).forEach(function(id){
      var s=st.scores[id];
      if(s.Brad){renderTabStars(tab,id,'Brad',s.Brad);setTabScoreDisp(tab,id,'Brad',s.Brad);}
      if(s.Wes){renderTabStars(tab,id,'Wes',s.Wes);setTabScoreDisp(tab,id,'Wes',s.Wes);}
      if(s.Brad&&s.Wes){showTabResult(tab,id);var card=document.getElementById('tcard-'+tab+'-'+id);if(card)card.classList.add('done');}
    });
    // Restore comment fields
    Object.keys(st.comments).forEach(function(id){
      var cm=st.comments[id];
      ['Brad','Wes'].forEach(function(name){
        var el=document.getElementById('tcomment-'+tab+'-'+id+'-'+name);
        if(el&&cm[name]) el.value=cm[name];
      });
    });
    updateTabProgress(tab); updateTabBottomNav(tab);
    setTabStatus(tab,'','');
  }).catch(function(e){
    console.error(tab+' load error',e);
    var v=document.getElementById('view-'+tab);
    if(v) v.innerHTML='<div class="loading-state" style="color:rgba(220,80,80,0.8)">Failed to load.</div>';
    setTabStatus(tab,'Load failed','error');
  });
};

var _origBuildTabCard = buildTabCard;
buildTabCard = function(tab, item) {
  var st = TAB_STATE[tab];
  if (!st.comments) st.comments = {};
  var card = _origBuildTabCard(tab, item);

  // Lightbox on main image
  var main = card.querySelector('.gal-main');
  if (main) {
    main.style.cursor = 'zoom-in';
    main.addEventListener('click', function(){
      var img = main.querySelector('img'); if(img) openLightbox(img.src);
    });
  }

  // Comment fields under each rater
  var ra = card.querySelector('.rating-area');
  if (ra) {
    ['Brad','Wes'].forEach(function(name) {
      var starsEl = ra.querySelector('#tstars-'+tab+'-'+item.id+'-'+name);
      if (!starsEl) return;
      var raterBlock = starsEl.parentElement;
      if (!raterBlock) return;
      var rRight = raterBlock.querySelector ? raterBlock.querySelector('.rater-right') : null;
      var target = rRight || raterBlock;
      var ta = document.createElement('textarea');
      ta.id = 'tcomment-'+tab+'-'+item.id+'-'+name;
      ta.placeholder = name+"'s note\u2026";
      ta.rows = 2;
      ta.style.cssText = 'width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--text);padding:4px 7px;font-size:0.64rem;border-radius:2px;font-family:Nunito,sans-serif;resize:vertical;margin-top:4px;line-height:1.4;';
      ta.addEventListener('input', function(){
        if(!st.comments[item.id]) st.comments[item.id]={};
        st.comments[item.id][name]=ta.value;
        clearTimeout(ta._t);
        ta._t=setTimeout(function(){saveTabScore(tab,item.id);},1200);
      });
      target.appendChild(ta);
    });
  }

  // Add note field to guest section
  var guestSec = card.querySelector('.guest-section');
  if (guestSec) {
    var submitBtn = guestSec.querySelector('.guest-submit');
    if (submitBtn && !guestSec.querySelector('.guest-note-ta')) {
      var ta = document.createElement('textarea');
      ta.className = 'guest-note-ta';
      ta.id = 'tgnote-'+tab+'-'+item.id;
      ta.placeholder = 'Optional note\u2026';
      ta.rows = 2;
      ta.style.cssText = 'width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--text);padding:4px 7px;font-size:0.63rem;border-radius:2px;font-family:Nunito,sans-serif;resize:vertical;margin-bottom:5px;line-height:1.4;';
      guestSec.insertBefore(ta, submitBtn);
    }
  }

  return card;
};

// ─── PATCH submitTabGuest to include note ─────────────────────────────────────
var _origSubmitTabGuest = submitTabGuest;
submitTabGuest = function(tab, id) {
  var st=TAB_STATE[tab];
  var nameEl=document.getElementById('tgname-'+tab+'-'+id);
  var noteEl=document.getElementById('tgnote-'+tab+'-'+id);
  var gname=(nameEl&&nameEl.value.trim())||'';
  var gscore=st.guestPending[id]||0;
  var gnote=(noteEl&&noteEl.value.trim())||'';
  if(!gname){alert('Please enter a guest name.');return;}
  if(!gscore){alert('Please select a star rating.');return;}
  if(!st.guestScores[id]) st.guestScores[id]=[];
  st.guestScores[id].push({name:gname,score:gscore,note:gnote});
  nameEl.value=''; if(noteEl) noteEl.value='';
  st.guestPending[id]=0; renderTabGuestStars(tab,id,0); setTabGuestDisp(tab,id,0);
  if(st.scores[id]&&st.scores[id].Brad&&st.scores[id].Wes) showTabResult(tab,id);
  saveTabScore(tab,id);
};

// ─── PATCH showTabResult for enhanced display ─────────────────────────────────
var _origShowTabResult = showTabResult;
showTabResult = function(tab, id) {
  var st=TAB_STATE[tab]; var s=st.scores[id]; if(!s||!s.Brad||!s.Wes) return;
  var avg=(s.Brad+s.Wes)/2;
  var avgStr=avg%1===0?avg.toFixed(1):avg.toFixed(2).replace(/0+$/,'');
  var gs=st.guestScores[id]||[];
  var cm=(st.comments&&st.comments[id])||{};
  var rb=document.getElementById('trb-'+tab+'-'+id); if(!rb) return;

  var guestHtml='';
  if(gs.length>0){
    var gSum=gs.reduce(function(a,b){return a+b.score;},0);
    guestHtml='<div class="guest-chips-label">Guest ratings &mdash; avg '+(gSum/gs.length).toFixed(1)+'</div>'+
      '<div class="guest-chips">'+gs.map(function(g){
        var full=Math.floor(g.score),half=g.score%1!==0;
        return '<div class="guest-chip"><span class="gc-name">'+esc(g.name)+'</span><span class="gc-score">'+'\u2605'.repeat(full)+(half?'\u00BD':'')+' '+g.score+'</span>'+(g.note?'<span class="gc-note">'+esc(g.note)+'</span>':'')+'</div>';
      }).join('')+'</div>';
  }
  var commentHtml='';
  if(cm.Brad||cm.Wes){
    commentHtml='<div class="result-comments">'+(cm.Brad?'<div class="rc-item"><span class="rc-who">Brad:</span> '+esc(cm.Brad)+'</div>':'')+(cm.Wes?'<div class="rc-item"><span class="rc-who">Wes:</span> '+esc(cm.Wes)+'</div>':'')+'</div>';
  }
  rb.style.display='block';
  rb.innerHTML=
    '<div class="res-scores-row"><div class="res-rater"><span class="res-rater-name">Brad</span><span class="res-rater-score">'+s.Brad+'</span></div>'+
    '<div class="res-avg-center"><div class="res-avg">'+avgStr+'</div><div class="res-avg-label">avg</div></div>'+
    '<div class="res-rater"><span class="res-rater-name">Wes</span><span class="res-rater-score">'+s.Wes+'</span></div></div>'+
    commentHtml+guestHtml;
};

// ─── PATCH showTabSummary for enhanced table ───────────────────────────────────
var _origShowTabSummary = showTabSummary;
showTabSummary = function(tab) {
  var st=TAB_STATE[tab];
  var el=document.getElementById('summary-'+tab); if(!el) return;
  el.style.display='block'; el.scrollIntoView({behavior:'smooth',block:'start'});
  var unrated=st.items.filter(function(it){return !st.scores[it.id]||!st.scores[it.id].Brad||!st.scores[it.id].Wes;}).length;
  var items=st.items.filter(function(it){return st.scores[it.id]&&st.scores[it.id].Brad&&st.scores[it.id].Wes;})
    .map(function(it){
      var s=st.scores[it.id]; var avg=(s.Brad+s.Wes)/2;
      var gs=st.guestScores[it.id]||[]; var gavg=gs.length>0?gs.reduce(function(a,b){return a+b.score;},0)/gs.length:null;
      var cm=(st.comments&&st.comments[it.id])||{};
      return{it:it,avg:avg,b:s.Brad,w:s.Wes,gavg:gavg,gcnt:gs.length,gs:gs,cm:cm};
    }).sort(function(a,b){return b.avg-a.avg;});

  function tbl(rows){
    if(!rows.length) return '<p style="color:var(--muted);font-size:0.74rem">No items rated yet.</p>';
    return '<table class="rtbl"><thead><tr><th>#</th><th>Item</th><th class="tc">Avg</th><th class="tc">Brad</th><th class="tc">Wes</th><th class="tc">Guests</th><th>Buy</th></tr></thead><tbody>'+
      rows.map(function(r,i){
        var lk=r.it.links&&r.it.links[0]?'<a href="'+r.it.links[0].url+'" target="_blank" rel="noopener">'+esc(r.it.links[0].store)+' \u2197</a>':'\u2014';
        var avgStr=r.avg%1===0?r.avg.toFixed(1):r.avg.toFixed(2).replace(/0+$/,'');
        var guestCell=r.gcnt===0?'<span style="color:var(--muted)">\u2014</span>':
          '<button class="guest-expand-btn" onclick="toggleGuestExpand(this)" data-guests=\''+JSON.stringify(r.gs)+'\'>'+r.gcnt+' \u2193</button>';
        var commentRow=(r.cm.Brad||r.cm.Wes)?
          '<tr class="comment-row"><td></td><td colspan="6" style="padding:2px 7px 8px;font-size:0.64rem;color:var(--muted);font-style:italic;">'+(r.cm.Brad?'<b style="color:var(--tc-light)">B:</b> '+esc(r.cm.Brad)+' ':'')+(r.cm.Wes?'<b style="color:var(--tc-light)">W:</b> '+esc(r.cm.Wes):'')+'</td></tr>':'';
        return '<tr><td class="td-rk">'+(i+1)+'</td><td class="td-nm">'+esc(r.it.id)+' &middot; '+esc(r.it.name)+(r.it.specs?' <small style="color:var(--tc-light);font-size:0.6rem">('+esc(r.it.specs)+')</small>':'')+'</td><td class="td-av">'+avgStr+'</td><td class="td-sc">'+r.b+'</td><td class="td-sc">'+r.w+'</td><td class="td-sc">'+guestCell+'</td><td class="td-lk">'+lk+'</td></tr>'+commentRow;
      }).join('')+'</tbody></table>';
  }
  el.innerHTML='<div class="sum-hdr">Results</div><div class="sum-sub">'+(st.items.length-unrated)+' of '+st.items.length+' items rated &middot; sorted by Brad &amp; Wes average</div>'+
    tbl(items)+(unrated>0?'<div class="sum-sec" style="margin-top:16px">Unrated ('+unrated+')</div><p style="font-size:0.68rem;color:var(--muted)">'+st.items.filter(function(it){return !st.scores[it.id]||!st.scores[it.id].Brad||!st.scores[it.id].Wes;}).map(function(it){return it.id;}).join(', ')+'</p>':'')+
    '<button class="restart" onclick="backTabSummary(\''+tab+'\')">&#8592; Back to Items</button>';
  var bnInfo=document.getElementById('bnav-info-'+tab); if(bnInfo) bnInfo.textContent='Summary';
  var nb=document.getElementById('btn-next-'+tab); if(nb) nb.style.display='none';
  var bb=document.getElementById('btn-back-'+tab); if(bb) bb.style.display='none';
  var sb=document.getElementById('btn-summary-'+tab); if(sb){sb.textContent='\u2190 Back';sb.onclick=function(){backTabSummary(tab);};sb.style.display='inline-block';}
};

// Patches applied above via function overrides — no re-init needed

</script>
